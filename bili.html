<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duflat — Cross-post Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg:       #262624;
    --surface:  #1E1E1C;
    --surface2: #2C2C2A;
    --accent:   #C15F3C;
    --good:     #5fb37a;
    --warn:     #d8a13a;
    --bad:      #c4564a;
    --muted:    #B1ADA1;
    --border:   rgba(177,173,161,.10);
    --border-m: rgba(177,173,161,.18);
    --text:     #FFFFFF;
    --faint:    rgba(177,173,161,.38);
    --radius:   12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Inter', system-ui, sans-serif;
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
}
main { max-width: 1100px; margin: 0 auto; padding: 0 24px 100px; }
.hero { text-align: center; padding: 64px 0 28px; }
.hero h1 {
    font-size: 1.9rem; font-weight: 600; letter-spacing: -.5px; margin-bottom: 8px;
}
.hero p { color: var(--muted); font-size: .92rem; max-width: 540px; margin: 0 auto; }

.controls {
    display: flex; gap: 12px; align-items: center; justify-content: center;
    flex-wrap: wrap; margin-bottom: 24px;
}
.control-group { display: flex; align-items: center; gap: 8px; }
.control-group label { color: var(--muted); font-size: .85rem; }
select, button {
    background: var(--surface); color: var(--text);
    border: 1px solid var(--border-m); border-radius: 9px;
    padding: 7px 12px; font-family: inherit; font-size: .88rem; cursor: pointer;
}
select:focus, button:focus { outline: none; border-color: var(--accent); }
button.primary { background: var(--accent); border-color: var(--accent); font-weight: 500; }
button:disabled { opacity: .45; cursor: not-allowed; }

#stats {
    text-align: center; color: var(--muted); font-size: .85rem;
    margin-bottom: 18px; min-height: 18px;
}
#stats .progress-bar {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--border-m); border-top-color: var(--accent);
    border-radius: 50%; animation: spin .8s linear infinite;
    vertical-align: middle; margin-right: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.tbl-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead th {
    text-align: left; padding: 12px 16px;
    font-size: .72rem; font-weight: 600; letter-spacing: .8px;
    text-transform: uppercase; color: var(--muted);
    background: var(--surface2);
    border-bottom: 1px solid var(--border-m);
    white-space: nowrap;
}
tbody td {
    padding: 11px 16px;
    border-top: 1px solid var(--border);
    vertical-align: middle;
}
tbody tr.creator-start td { border-top: 1px solid var(--border-m); }
tbody tr.creator-start:first-child td { border-top: none; }

td.creator-cell {
    font-weight: 600; font-size: .92rem;
    width: 22%; vertical-align: top; padding-top: 14px;
}
td.creator-cell .clinks {
    margin-top: 4px; display: flex; flex-direction: column; gap: 2px;
}
td.creator-cell .clinks a {
    color: var(--muted); font-size: .75rem; font-weight: 400;
    text-decoration: none;
}
td.creator-cell .clinks a:hover { color: var(--accent); }

td.title-cell { width: 56%; }
td.title-cell a {
    color: var(--text); text-decoration: none;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
}
td.title-cell a:hover { color: var(--accent); }
td.date-cell {
    color: var(--muted); font-family: 'Roboto Mono', monospace;
    font-size: .8rem; white-space: nowrap; width: 11%;
}
td.status-cell {
    text-align: center; width: 11%; white-space: nowrap;
}
.status-pill {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    font-weight: 700; font-size: 1rem;
}
.status-pill.yes { background: rgba(95,179,122,.16); color: var(--good); }
.status-pill.no  { background: rgba(196,86,74,.18);  color: var(--bad);  }
.status-pill.qm  { background: rgba(216,161,58,.16); color: var(--warn); }
tr.flag td { background: rgba(196,86,74,.05); }

td.empty-row {
    color: var(--faint); font-style: italic; font-size: .85rem;
}
td.error-row {
    color: var(--bad); font-size: .82rem;
}

@media (max-width: 760px) {
    td.creator-cell { width: 30%; font-size: .85rem; }
    td.title-cell   { font-size: .85rem; }
    td.date-cell    { display: none; }
}
</style>
</head>
<body>
<main>
    <div class="hero">
        <h1>Cross-post Monitor</h1>
        <p>Manager seç — yönettiğin creator'ların YouTube'da paylaşıp Bilibili'de paylaşmadığı videolar listelenir.</p>
    </div>

    <div class="controls">
        <div class="control-group">
            <label for="manager">Manager</label>
            <select id="manager"><option value="">Loading…</option></select>
        </div>
        <div class="control-group">
            <label for="window">Window</label>
            <select id="window">
                <option value="7">7 days</option>
                <option value="30" selected>30 days</option>
                <option value="60">60 days</option>
                <option value="90">90 days</option>
            </select>
        </div>
        <button id="refresh" disabled>Refresh</button>
    </div>

    <div id="stats"></div>

    <div class="tbl-wrap" id="tableWrap" style="display:none">
        <table>
            <thead>
                <tr>
                    <th>Creator</th>
                    <th>YouTube video</th>
                    <th>Date</th>
                    <th style="text-align:center">Bilibili</th>
                </tr>
            </thead>
            <tbody id="rows"></tbody>
        </table>
    </div>
</main>

<script>
const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? 'http://localhost:5000'
    : 'https://duflat-production.up.railway.app';

const $   = sel => document.querySelector(sel);
const esc = s => (s || '').replace(/[&<>"]/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

let inflight = false;

async function loadManagers() {
    const sel = $('#manager');
    try {
        const r = await fetch(`${API_BASE}/bili/managers`);
        const j = await r.json();
        sel.innerHTML = '<option value="">Select manager…</option>' +
            (j.managers || []).map(m => `<option value="${esc(m)}">${esc(m)}</option>`).join('');
    } catch (e) {
        sel.innerHTML = '<option value="">API offline</option>';
    }
}

async function runChecks() {
    if (inflight) return;
    const manager = $('#manager').value;
    if (!manager) {
        $('#tableWrap').style.display = 'none';
        $('#stats').textContent = '';
        $('#refresh').disabled = true;
        return;
    }
    inflight = true;
    $('#refresh').disabled = true;
    $('#manager').disabled = true;
    $('#window').disabled = true;
    $('#rows').innerHTML = '';
    $('#tableWrap').style.display = 'block';
    $('#stats').innerHTML = '<span class="progress-bar"></span>Loading roster…';

    let creators = [];
    try {
        const r = await fetch(`${API_BASE}/bili/creators?manager=${encodeURIComponent(manager)}`);
        const j = await r.json();
        creators = j.creators || [];
    } catch (e) {
        $('#stats').textContent = 'Failed to load roster';
        finishRun();
        return;
    }
    if (!creators.length) {
        $('#stats').textContent = 'No creators with a YouTube channel.';
        finishRun();
        return;
    }

    const window_days = parseInt($('#window').value, 10);
    let totalMissing = 0;
    let done = 0;
    for (const c of creators) {
        $('#stats').innerHTML =
            `<span class="progress-bar"></span>Checking ${done+1}/${creators.length}: ${esc(c.name)}…`;
        try {
            const r = await fetch(`${API_BASE}/bili/check`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({creator: c, window_days}),
            });
            const result = await r.json();
            totalMissing += appendRows(c, result);
        } catch (e) {
            appendRows(c, {error: e.message || String(e)});
        }
        done++;
    }
    const missingNote = totalMissing
        ? ` — <strong style="color:var(--bad)">${totalMissing} video missing on Bilibili</strong>`
        : ' — all caught up ✓';
    $('#stats').innerHTML = `${done} creators checked${missingNote}`;
    finishRun();
}

function finishRun() {
    inflight = false;
    $('#refresh').disabled = false;
    $('#manager').disabled = false;
    $('#window').disabled = false;
}

function appendRows(c, r) {
    const tbody = $('#rows');
    const creatorCell = renderCreatorCell(c);

    // Hard errors stay visible — they're actionable diagnostics.
    if (r.error) {
        tbody.insertAdjacentHTML('beforeend',
            `<tr class="creator-start"><td class="creator-cell">${creatorCell}</td>
             <td colspan="3" class="error-row">${esc(r.error)}</td></tr>`);
        return 0;
    }

    // Bilibili check failed — surface the creator with a "couldn't check"
    // row so the user knows it wasn't silently dropped.
    if (r.status === 'bb_unavailable') {
        const errLabel = r.bb_error || 'unknown';
        tbody.insertAdjacentHTML('beforeend',
            `<tr class="creator-start"><td class="creator-cell">${creatorCell}</td>
             <td colspan="3" class="error-row">Bilibili check failed: ${esc(errLabel)}</td></tr>`);
        return 0;
    }

    // Out-of-scope creators (no Bilibili / no YT uploads / no platforms) are
    // hidden — the page only makes sense for creators present on both.
    if (r.status === 'no_bilibili' || r.status === 'no_platforms') return 0;
    const yt = r.youtube_recent || [];
    if (!yt.length) return 0;

    // Show every recent YT video — green ✓ when cross-posted to Bilibili,
    // red ✗ when missing. Manager wants the full picture per creator, not
    // just the misses.
    const missingIds = new Set((r.missing_on_bilibili || []).map(v => v.video_id));
    let missingCount = 0;

    yt.forEach((v, i) => {
        const isMissing = missingIds.has(v.video_id);
        if (isMissing) missingCount++;
        const nameCell = i === 0
            ? `<td class="creator-cell" rowspan="${yt.length}">${creatorCell}</td>`
            : '';
        const cls = [i === 0 ? 'creator-start' : '', isMissing ? 'flag' : ''].filter(Boolean).join(' ');
        tbody.insertAdjacentHTML('beforeend', `
            <tr class="${cls}">
                ${nameCell}
                <td class="title-cell">
                    <a href="${esc(v.url)}" target="_blank" rel="noopener">${esc(v.title)}</a>
                </td>
                <td class="date-cell">${esc(v.published || '—')}</td>
                <td class="status-cell">
                    <span class="status-pill ${isMissing ? 'no' : 'yes'}"
                          title="${isMissing ? 'Not posted on Bilibili' : 'Cross-posted on Bilibili'}">${isMissing ? '✗' : '✓'}</span>
                </td>
            </tr>
        `);
    });
    return missingCount;
}

function renderCreatorCell(c) {
    const links = [];
    if (c.youtube_url)  links.push(`<a href="${esc(c.youtube_url)}"  target="_blank" rel="noopener">YouTube ↗</a>`);
    if (c.bilibili_url) links.push(`<a href="${esc(c.bilibili_url)}" target="_blank" rel="noopener">Bilibili ↗</a>`);
    return `${esc(c.name)}<div class="clinks">${links.join('')}</div>`;
}

$('#manager').addEventListener('change', runChecks);
$('#window') .addEventListener('change', runChecks);
$('#refresh').addEventListener('click',  runChecks);
loadManagers();
</script>
</body>
</html>
