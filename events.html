<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ACG 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f6f3ec;
    --card: #ffffff;
    --border: #d8d2c3;
    --border-subtle: #e8e3d4;
    --hairline: #efeadd;

    --text: #2b2620;
    --text-secondary: #524b41;
    --muted: #7a7167;
    --tertiary: #9d9387;

    --accent: #b85d3a;
    --accent-soft: rgba(184,93,58,.10);

    --c-anime: #c2185b;
    --c-comic: #d97706;
    --c-game:  #4f46c0;
    --c-mixed: #2e8a52;

    --shadow-sm: 0 1px 2px rgba(63,47,30,.04);
    --shadow-md: 0 4px 14px rgba(63,47,30,.06), 0 1px 3px rgba(63,47,30,.04);
    --ease: cubic-bezier(.4,0,.2,1);

    --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
            "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); }
  body {
    font-family: var(--font);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
    text-rendering: optimizeLegibility;
    font-size: 15px;
  }
  a { color: inherit; text-decoration: none; }

  /* ───── STICKY FILTER BAR ───── */
  .bar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(246,243,236,0.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--border-subtle);
  }
  .bar .inner {
    max-width: 920px; margin: 0 auto;
    padding: 18px 24px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .group { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .pill {
    border: 1px solid var(--border-subtle);
    background: var(--card);
    color: var(--text-secondary);
    padding: 7px 14px; border-radius: 980px;
    font-family: inherit;
    font-size: .8rem; font-weight: 500;
    cursor: pointer;
    transition: all .2s var(--ease);
    user-select: none;
    box-shadow: var(--shadow-sm);
    line-height: 1;
  }
  .pill:hover {
    border-color: var(--border); color: var(--text);
    transform: translateY(-1px); box-shadow: var(--shadow-md);
  }
  .pill.on {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .search {
    margin-left: auto;
    border: 1px solid var(--border-subtle);
    background: var(--card);
    border-radius: 980px;
    padding: 8px 16px;
    font-size: .82rem; width: 240px;
    outline: none;
    font-family: inherit;
    color: var(--text);
    box-shadow: var(--shadow-sm);
    transition: all .2s var(--ease);
  }
  .search::placeholder { color: var(--tertiary); }
  .search:focus { border-color: var(--accent); box-shadow: var(--shadow-md); }
  @media (max-width: 760px) { .search { margin-left: 0; width: 100%; } }

  /* ───── TABLE ───── */
  .wrap { max-width: 920px; margin: 0 auto; padding: 8px 24px 120px; }

  table.cal {
    width: 100%;
    border-collapse: collapse;
  }
  table.cal tr.month-row td {
    padding: 36px 0 12px;
    font-size: .68rem;
    font-weight: 600;
    color: var(--tertiary);
    text-transform: uppercase;
    letter-spacing: .12em;
    border-bottom: 1px solid var(--hairline);
  }
  table.cal tr.row {
    transition: background .15s var(--ease);
  }
  table.cal tr.row:hover { background: var(--hairline); cursor: pointer; }
  table.cal tr.row td {
    padding: 20px 14px;
    border-bottom: 1px solid var(--hairline);
    vertical-align: middle;
  }
  table.cal tr.row td.date {
    font-weight: 600;
    font-size: .82rem;
    color: var(--text);
    white-space: nowrap;
    width: 130px;
    padding-left: 6px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -.005em;
  }
  table.cal tr.row td.date .approx {
    color: var(--tertiary);
    font-weight: 400;
    margin-left: 3px;
  }
  table.cal tr.row td.name {
    font-weight: 600;
    font-size: 1.02rem;
    letter-spacing: -.015em;
    color: var(--text);
    line-height: 1.3;
  }
  table.cal tr.row td.name .notes {
    display: block;
    font-weight: 400;
    font-size: .78rem;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0;
    line-height: 1.45;
  }
  table.cal tr.row td.loc {
    color: var(--text-secondary);
    font-size: .85rem;
    white-space: nowrap;
    font-weight: 500;
  }
  table.cal tr.row td.tag-cell {
    text-align: right;
    width: 120px;
    padding-right: 6px;
    white-space: nowrap;
  }
  .tag {
    display: inline-flex; align-items: center;
    font-size: .68rem;
    font-weight: 600;
    color: var(--text-secondary);
    padding: 5px 11px;
    border-radius: 980px;
    background: var(--card);
    border: 1px solid var(--border-subtle);
    line-height: 1;
    letter-spacing: .01em;
  }
  .tag::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 7px;
  }
  .tag.t-anime::before { background: var(--c-anime); }
  .tag.t-comic::before { background: var(--c-comic); }
  .tag.t-game::before  { background: var(--c-game); }
  .tag.t-mixed::before { background: var(--c-mixed); }

  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: .9rem;
  }

  /* ───── MOBILE COLLAPSE ───── */
  @media (max-width: 720px) {
    body { font-size: 14px; }
    .wrap { padding: 8px 18px 80px; }
    table.cal tr.row {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
      padding: 18px 4px;
      border-bottom: 1px solid var(--hairline);
    }
    table.cal tr.row td { padding: 0; border: none; }
    table.cal tr.row td.date { grid-column: 1; grid-row: 1; width: auto; }
    table.cal tr.row td.tag-cell { grid-column: 2; grid-row: 1; text-align: right; width: auto; }
    table.cal tr.row td.name { grid-column: 1 / -1; grid-row: 2; margin-top: 6px; }
    table.cal tr.row td.loc  { grid-column: 1 / -1; grid-row: 3; margin-top: 2px; }
  }
</style>
</head>

<div class="bar">

const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const MSHORT = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const CAT = { anime:"Anime", comic:"Comic", game:"Game", mixed:"Mixed" };

const state = { cat:"all", reg:"all", q:"" };

function fmtRange(ev) {
  const s = new Date(ev.date+"T00:00");
  const e = ev.endDate ? new Date(ev.endDate+"T00:00") : null;
  const sM = MSHORT[s.getMonth()];
  if (!e) return `${sM} ${s.getDate()}`;
  if (s.getMonth() === e.getMonth())
    return `${sM} ${s.getDate()}–${e.getDate()}`;
  const eM = MSHORT[e.getMonth()];
  return `${sM} ${s.getDate()} – ${eM} ${e.getDate()}`;
}

function pass(ev) {
  if (state.cat !== "all" && ev.category !== state.cat) return false;
  if (state.reg !== "all" && ev.region !== state.reg) return false;
  if (state.q) {
    const q = state.q.toLowerCase();
    const hay = (ev.name + " " + ev.city + " " + ev.country).toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function render() {
  const filtered = EVENTS.filter(pass).sort((a,b) => a.date.localeCompare(b.date));
  const tbody = document.querySelector("#cal tbody");
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4"><div class="empty">No events match.</div></td></tr>`;
    return;
  }
  let html = "";
  let lastMonth = -1;
  filtered.forEach(ev => {
    const mIdx = parseInt(ev.date.slice(5,7),10) - 1;
    if (mIdx !== lastMonth) {
      html += `<tr class="month-row"><td colspan="4">${MONTHS[mIdx]}</td></tr>`;
      lastMonth = mIdx;
    }
    html += `
      <tr class="row" data-url="${ev.url}">
        <td class="date">${fmtRange(ev)}${ev.dateApprox ? `<span class="approx">~</span>` : ""}</td>
        <td class="name">${ev.name}${ev.notes ? `<span class="notes">${ev.notes}</span>` : ""}</td>
        <td class="loc">${ev.city}, ${ev.country}</td>
        <td class="tag-cell"><span class="tag t-${ev.category}">${CAT[ev.category]}</span></td>
      </tr>`;
  });
  tbody.innerHTML = html;
}

document.querySelectorAll(".pill[data-f]").forEach(p => {
  p.addEventListener("click", () => {
    const f = p.dataset.f;
    document.querySelectorAll(`.pill[data-f="${f}"]`).forEach(x => x.classList.remove("on"));
    p.classList.add("on");
    state[f] = p.dataset.v;
    render();
  });
});
document.getElementById("searchInput").addEventListener("input", e => {
  state.q = e.target.value.trim();
  render();
});
document.querySelector("#cal tbody").addEventListener("click", e => {
  const row = e.target.closest("tr.row");
  if (row && row.dataset.url) window.open(row.dataset.url, "_blank", "noopener");
});

render();
</script>
