<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duflat — YouTube Channel Investigator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: #0d0d0d;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #e0e0e0;
        }

        header {
            padding: 28px 40px;
            border-bottom: 1px solid #1e1e1e;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
        }

        .logo-dot { color: #a855f7; }

        main {
            max-width: 820px;
            margin: 0 auto;
            padding: 60px 24px 80px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 0.95rem;
        }

        .search-wrap {
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
        }

        #urlInput {
            flex: 1;
            background: #161616;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 14px 18px;
            font-size: 0.95rem;
            color: #e0e0e0;
            outline: none;
            transition: border-color .2s;
        }

        #urlInput::placeholder { color: #444; }
        #urlInput:focus { border-color: #667eea; }

        #searchBtn {
            background: linear-gradient(135deg, #667eea, #a855f7);
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            white-space: nowrap;
        }

        #searchBtn:hover { opacity: 0.88; }
        #searchBtn:active { transform: scale(0.98); }
        #searchBtn:disabled { opacity: 0.4; cursor: default; }

        /* Status / hata */
        #statusMsg {
            display: none;
            font-size: 0.88rem;
            color: #ef4444;
            margin-bottom: 20px;
        }

        /* Loading */
        #loader {
            display: none;
            text-align: center;
            padding: 60px 0;
            color: #555;
        }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid #222;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Sonuç kartı */
        #result { display: none; }

        .card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 14px;
            overflow: hidden;
        }

        .card-header {
            padding: 24px 28px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: flex-start;
            gap: 16px;
        }

        .channel-avatar {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #a855f7);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
        }

        .channel-name {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }

        .channel-handle {
            color: #667eea;
            font-size: 0.9rem;
        }

        .channel-url-link {
            color: #444;
            font-size: 0.8rem;
            text-decoration: none;
            margin-top: 4px;
            display: block;
        }

        .channel-url-link:hover { color: #667eea; }

        /* Stats row */
        .stats-row {
            display: flex;
            gap: 0;
            border-bottom: 1px solid #1a1a1a;
        }

        .stat-item {
            flex: 1;
            padding: 18px 20px;
            border-right: 1px solid #1a1a1a;
            text-align: center;
        }

        .stat-item:last-child { border-right: none; }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 3px;
        }

        .stat-label {
            font-size: 0.72rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        /* Info grid */
        .info-grid {
            padding: 24px 28px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-label { font-size: 0.72rem; color: #555; text-transform: uppercase; letter-spacing: .5px; }
        .info-value { font-size: 0.9rem; color: #ccc; word-break: break-word; }
        .info-value a { color: #667eea; text-decoration: none; }
        .info-value a:hover { text-decoration: underline; }
        .info-value.empty { color: #333; font-style: italic; }

        .info-full { grid-column: 1 / -1; }

        /* Description */
        .description-box {
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 12px 14px;
            font-size: 0.85rem;
            color: #888;
            line-height: 1.6;
            white-space: pre-wrap;
            max-height: 120px;
            overflow-y: auto;
        }

        /* Sosyal medya linkleri */
        .social-grid {
            padding: 0 28px 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .social-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #181818;
            border: 1px solid #252525;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.82rem;
            color: #bbb;
            text-decoration: none;
            transition: border-color .2s, color .2s;
        }

        .social-badge:hover { border-color: #667eea; color: #fff; }

        /* All links */
        .all-links-section {
            padding: 0 28px 28px;
        }

        .all-links-title {
            font-size: 0.72rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 10px;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .link-list a {
            font-size: 0.82rem;
            color: #555;
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-list a:hover { color: #667eea; }

        /* Lokal API uyarısı */
        #apiWarning {
            display: none;
            background: #1a1000;
            border: 1px solid #3a2800;
            border-radius: 10px;
            padding: 16px 20px;
            font-size: 0.88rem;
            color: #aaa;
            margin-bottom: 24px;
            line-height: 1.7;
        }

        #apiWarning code {
            background: #111;
            padding: 2px 6px;
            border-radius: 4px;
            color: #e0b0ff;
            font-size: 0.82rem;
        }

        /* Agency Investigation card */
        #agencyResult {
            display: none;
            margin-top: 20px;
        }

        .agency-card {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 14px;
            overflow: hidden;
        }

        .agency-header {
            padding: 18px 28px;
            border-bottom: 1px solid #1a1a1a;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .agency-header-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: #555;
            font-weight: 600;
        }

        .agency-loading {
            padding: 28px;
            display: flex;
            align-items: center;
            gap: 14px;
            color: #555;
            font-size: 0.88rem;
        }

        .agency-loading .spinner {
            width: 20px; height: 20px;
            border-width: 2px;
            margin: 0;
            flex-shrink: 0;
        }

        .agency-loading .step-text {
            font-style: italic;
        }

        .agency-not-found {
            padding: 28px;
            color: #444;
            font-size: 0.88rem;
            font-style: italic;
        }

        .agency-body {
            padding: 24px 28px;
        }

        .agency-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .agency-website {
            font-size: 0.88rem;
            color: #667eea;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 14px;
        }

        .agency-website:hover { text-decoration: underline; }

        .agency-desc {
            font-size: 0.85rem;
            color: #888;
            line-height: 1.6;
            margin-bottom: 16px;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            border-radius: 8px;
            padding: 12px 14px;
        }

        .agency-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 16px;
        }

        .agency-social-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .agency-summary {
            font-size: 0.88rem;
            color: #aaa;
            line-height: 1.65;
            margin-bottom: 14px;
        }

        .agency-tags-section {
            margin-top: 14px;
        }

        .agency-tags-label {
            font-size: 0.72rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 8px;
        }

        .agency-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .agency-tag {
            background: #181818;
            border: 1px solid #252525;
            border-radius: 6px;
            padding: 4px 10px;
            font-size: 0.78rem;
            color: #999;
        }

        .agency-tag-client {
            border-color: #2a2a3a;
            color: #7b8ec8;
        }

        .agency-note {
            margin-top: 10px;
            font-size: 0.78rem;
            color: #444;
            font-style: italic;
        }

        .agency-source {
            margin-top: 16px;
            font-size: 0.75rem;
            color: #333;
        }

        .source-badge {
            display: inline-block;
            background: #181818;
            border: 1px solid #252525;
            border-radius: 12px;
            padding: 3px 10px;
            font-size: 0.72rem;
            color: #555;
        }

        @media (max-width: 600px) {
            .info-grid { grid-template-columns: 1fr; }
            .stats-row { flex-wrap: wrap; }
            .stat-item { min-width: 50%; }
            .agency-fields { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <span class="logo">Duflat</span>
    </header>

    <main>
        <h1>YouTube Channel Investigator</h1>
        <p class="subtitle">Paste a video or channel link to reveal social accounts, contact info, and more.</p>

        <div id="apiWarning">
            ⚠️ API not connected. Update the Railway URL after deploying.
        </div>

        <div class="search-wrap">
            <input
                id="urlInput"
                type="text"
                placeholder="https://youtube.com/watch?v=... or https://youtube.com/@channel"
                autocomplete="off"
                spellcheck="false"
            />
            <button id="searchBtn" onclick="doSearch()">Investigate</button>
        </div>

        <div id="statusMsg"></div>
        <div id="loader">
            <div class="spinner"></div>
            <div id="loaderText">Fetching channel info...</div>
        </div>
        <div id="result"></div>
        <div id="agencyResult"></div>
    </main>

    <script>
        // Yerelde localhost, production'da Railway URL'i
        const API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? 'http://localhost:5000'
            : 'https://duflat-production.up.railway.app';

        document.getElementById('urlInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') doSearch();
        });

        // API bağlantısı henüz yapılandırılmamışsa uyarı göster
        if (API_URL.includes('RAILWAY_URL_BURAYA')) {
            document.getElementById('apiWarning').style.display = 'block';
        }

        async function doSearch() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            setStatus('');
            showLoader(true);
            showResult(false);
            hideAgency();
            document.getElementById('searchBtn').disabled = true;

            let channelData = null;

            try {
                const res = await fetch(`${API_URL}/scrape`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await res.json();

                if (!res.ok || data.error) {
                    setStatus(data.error || 'An error occurred.');
                } else {
                    channelData = data;
                    renderResult(data);
                }
            } catch (err) {
                setStatus('Could not reach the API. Is app.py running?');
            } finally {
                showLoader(false);
                document.getElementById('searchBtn').disabled = false;
            }

            // Channel info başarıyla geldi — agency aramasını başlat
            if (channelData) {
                investigateAgency(channelData);
            }
        }

        async function investigateAgency(channelData) {
            showAgencyLoading();

            const steps = [
                'Checking email domain...',
                'Scanning external links...',
                'Analyzing social profiles...',
                'Searching the web...',
                'Compiling report...',
            ];
            let stepIdx = 0;
            const stepInterval = setInterval(() => {
                stepIdx = (stepIdx + 1) % steps.length;
                const el = document.getElementById('agencyStepText');
                if (el) el.textContent = steps[stepIdx];
            }, 3000);

            try {
                const res = await fetch(`${API_URL}/agency`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel_data: channelData })
                });
                const data = await res.json();
                clearInterval(stepInterval);
                renderAgency(data);
            } catch (err) {
                clearInterval(stepInterval);
                renderAgency({ found: false });
            }
        }

        function renderResult(d) {
            const name = d.name || 'Unknown Channel';
            const initial = name.charAt(0).toUpperCase();

            const socials = ['instagram', 'tiktok', 'twitter', 'facebook', 'discord', 'twitch', 'myanimelist'];
            const socialIcons = {
                instagram: '📷', tiktok: '🎵', twitter: '𝕏',
                facebook: '👤', discord: '💬', twitch: '🎮', myanimelist: '🎌'
            };
            const socialNames = {
                instagram: 'Instagram', tiktok: 'TikTok', twitter: 'X / Twitter',
                facebook: 'Facebook', discord: 'Discord', twitch: 'Twitch', myanimelist: 'MyAnimeList'
            };

            const socialBadges = socials
                .filter(s => d[s])
                .map(s => `<a class="social-badge" href="${esc(d[s])}" target="_blank" rel="noopener">${socialIcons[s]} ${socialNames[s]}</a>`)
                .join('');

            const allLinks = Array.isArray(d.all_links) ? d.all_links : [];
            const linkItems = allLinks
                .slice(0, 12)
                .map(l => `<a href="${esc(l)}" target="_blank" rel="noopener">${esc(l)}</a>`)
                .join('');

            const html = `
                <div class="card">
                    <div class="card-header">
                        <div class="channel-avatar">${initial}</div>
                        <div>
                            <div class="channel-name">${esc(name)}</div>
                            ${d.handle ? `<div class="channel-handle">${esc(d.handle)}</div>` : ''}
                            ${d.channel_url ? `<a class="channel-url-link" href="${esc(d.channel_url)}" target="_blank" rel="noopener">${esc(d.channel_url)}</a>` : ''}
                        </div>
                    </div>

                    <div class="stats-row">
                        ${statItem(d.subscribers, 'Subscribers')}
                        ${statItem(d.videos, 'Videos')}
                        ${statItem(d.views, 'Total Views')}
                        ${statItem(d.last_video_date, 'Last Video')}
                    </div>

                    <div class="info-grid">
                        ${infoItem('Email', d.email ? `<a href="mailto:${esc(d.email)}">${esc(d.email)}</a>` : null)}
                        ${infoItem('Location', d.location)}
                        ${infoItem('Joined', d.joined)}
                        ${d.description ? `
                        <div class="info-item info-full">
                            <span class="info-label">Description</span>
                            <div class="description-box">${esc(d.description)}</div>
                        </div>` : ''}
                    </div>

                    ${socialBadges ? `<div class="social-grid">${socialBadges}</div>` : ''}

                    ${linkItems ? `
                    <div class="all-links-section">
                        <div class="all-links-title">External Links</div>
                        <div class="link-list">${linkItems}</div>
                    </div>` : ''}
                </div>
            `;

            document.getElementById('result').innerHTML = html;
            showResult(true);
        }

        function statItem(val, label) {
            return `<div class="stat-item">
                <div class="stat-value">${val ? esc(val) : '<span style="color:#333">—</span>'}</div>
                <div class="stat-label">${label}</div>
            </div>`;
        }

        function infoItem(label, val) {
            if (!val) return `<div class="info-item">
                <span class="info-label">${label}</span>
                <span class="info-value empty">Not found</span>
            </div>`;
            return `<div class="info-item">
                <span class="info-label">${label}</span>
                <span class="info-value">${val}</span>
            </div>`;
        }

        function showAgencyLoading() {
            document.getElementById('agencyResult').innerHTML = `
                <div class="agency-card">
                    <div class="agency-header">
                        <span class="agency-header-title">Agency Investigation</span>
                    </div>
                    <div class="agency-loading">
                        <div class="spinner"></div>
                        <span class="step-text" id="agencyStepText">Checking email domain...</span>
                    </div>
                </div>`;
            document.getElementById('agencyResult').style.display = 'block';
        }

        function hideAgency() {
            const el = document.getElementById('agencyResult');
            el.style.display = 'none';
            el.innerHTML = '';
        }

        function renderAgency(d) {
            const sourceLabels = {
                'email_domain':     'Found via email domain',
                'external_link':    'Found via external link',
                'linktree':         'Found via Linktree',
                'description_regex':'Found via description',
                'web_search':       'Found via web search',
                'ai_analysis':      'Identified by AI',
            };

            if (!d.found) {
                document.getElementById('agencyResult').innerHTML = `
                    <div class="agency-card">
                        <div class="agency-header">
                            <span class="agency-header-title">Agency Investigation</span>
                        </div>
                        <div class="agency-not-found">No agency or management company could be identified from the available data.</div>
                    </div>`;
                return;
            }

            const name        = d.name || '';
            const website     = d.website || '';
            const email       = d.contact_email || d.email || '';
            const phone       = d.contact_phone || d.phone || '';
            const address     = d.address || '';
            const founded     = d.founded || '';
            const desc        = d.description || '';
            const summary     = d.summary || '';
            const services    = Array.isArray(d.services) ? d.services : [];
            const clients     = Array.isArray(d.notable_clients) ? d.notable_clients : [];
            const socials     = d.socials || {};
            const source      = d.source || '';

            const socialIcons = {
                instagram: '📷', tiktok: '🎵', twitter: '𝕏',
                facebook: '👤', discord: '💬', twitch: '🎮',
                linkedin: '💼', myanimelist: '🎌'
            };
            const socialNames = {
                instagram: 'Instagram', tiktok: 'TikTok', twitter: 'X / Twitter',
                facebook: 'Facebook', discord: 'Discord', twitch: 'Twitch',
                linkedin: 'LinkedIn', myanimelist: 'MyAnimeList'
            };

            // Sosyal medya — hem agency socials dict'inden hem channel socials'tan
            const socialBadges = Object.entries(socials)
                .filter(([, v]) => v && v !== 'null')
                .map(([k, v]) => `<a class="social-badge" href="${esc(v)}" target="_blank" rel="noopener">${socialIcons[k] || '🔗'} ${socialNames[k] || k}</a>`)
                .join('');

            // Info grid alanları
            const infoFields = [
                email   ? `<div class="info-item"><span class="info-label">Email</span><span class="info-value"><a href="mailto:${esc(email)}">${esc(email)}</a></span></div>` : '',
                phone   ? `<div class="info-item"><span class="info-label">Phone</span><span class="info-value">${esc(phone)}</span></div>` : '',
                address ? `<div class="info-item"><span class="info-label">Location</span><span class="info-value">${esc(address)}</span></div>` : '',
                founded ? `<div class="info-item"><span class="info-label">Founded</span><span class="info-value">${esc(founded)}</span></div>` : '',
            ].filter(Boolean).join('');

            const servicesTags = services.length
                ? `<div class="agency-tags-section">
                     <div class="agency-tags-label">Services</div>
                     <div class="agency-tags">${services.map(s => `<span class="agency-tag">${esc(s)}</span>`).join('')}</div>
                   </div>`
                : '';

            const clientsTags = clients.length
                ? `<div class="agency-tags-section">
                     <div class="agency-tags-label">Notable Clients</div>
                     <div class="agency-tags">${clients.map(c => `<span class="agency-tag agency-tag-client">${esc(c)}</span>`).join('')}</div>
                   </div>`
                : '';

            document.getElementById('agencyResult').innerHTML = `
                <div class="agency-card">
                    <div class="agency-header">
                        <span class="agency-header-title">Agency / Management</span>
                    </div>
                    <div class="agency-body">
                        ${name    ? `<div class="agency-name">${esc(name)}</div>` : ''}
                        ${website ? `<a class="agency-website" href="${esc(website)}" target="_blank" rel="noopener">${esc(website)}</a>` : ''}
                        ${summary ? `<div class="agency-summary">${esc(summary)}</div>` : ''}
                        ${desc    ? `<div class="agency-desc">${esc(desc)}</div>` : ''}
                        ${infoFields ? `<div class="agency-fields">${infoFields}</div>` : ''}
                        ${servicesTags}
                        ${clientsTags}
                        ${socialBadges ? `<div class="agency-social-grid">${socialBadges}</div>` : ''}
                        ${d.note      ? `<div class="agency-note">${esc(d.note)}</div>` : ''}
                        ${d.reasoning ? `<div class="agency-note">${esc(d.reasoning)}</div>` : ''}
                        ${source      ? `<div class="agency-source"><span class="source-badge">${esc(sourceLabels[source] || source)}</span></div>` : ''}
                    </div>
                </div>`;
        }

        function esc(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function setStatus(msg) {
            const el = document.getElementById('statusMsg');
            el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }

        function showResult(show) {
            document.getElementById('result').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
