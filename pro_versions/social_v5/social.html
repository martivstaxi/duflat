<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duflat — Social Listening</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700;900&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #f5f5f3;
    --card: #ffffff;
    --border: #e5e5e3;
    --text: #1a1a1a;
    --muted: #888;
    --positive: #16a34a;
    --negative: #dc2626;
    --neutral: #ca8a04;
    --accent: #c15f3c;
}

body { font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
html[lang^="zh"] body { font-family: 'Noto Sans SC', 'Inter', -apple-system, sans-serif; }

.container { max-width: 780px; margin: 0 auto; padding: 0 20px; }

header { padding: 48px 0 16px; text-align: center; }
header h1 { font-family: 'Merriweather', serif; font-size: 1.6rem; font-weight: 900; }
html[lang^="zh"] header h1 { font-family: 'Noto Sans SC', 'Merriweather', serif; font-weight: 900; }

/* Language toggle — top-right, fixed */
.lang-toggle {
    position: fixed; top: 14px; right: 14px; z-index: 200;
    display: inline-flex; gap: 2px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 999px; padding: 3px;
    box-shadow: 0 1px 4px rgba(0,0,0,.04);
}
.lang-btn {
    padding: 5px 12px; border-radius: 999px; border: none;
    background: transparent; font-family: inherit; font-size: .7rem; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all .15s; line-height: 1;
    min-width: 36px;
}
.lang-btn:hover { color: var(--text); }
.lang-btn.active { background: var(--accent); color: #fff; }
@media (max-width: 600px) {
    .lang-toggle { top: 10px; right: 10px; padding: 2px; }
    .lang-btn { padding: 4px 10px; font-size: .65rem; min-width: 32px; }
}

/* Sentiment buttons — centered under title */
.sentiment-btns {
    display: flex; gap: 8px; justify-content: center;
    padding: 14px 0 30px;
}
.sent-btn {
    padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--card); font-family: inherit; font-size: .75rem; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all .15s; user-select: none;
    display: flex; align-items: center; gap: 5px;
}
.sent-btn:hover { border-color: #aaa; color: var(--text); }
.sent-btn .dot { width: 7px; height: 7px; border-radius: 50%; }
.sent-btn .count { font-size: .65rem; font-weight: 500; opacity: .7; }
.sent-btn.active.pos { background: var(--positive); color: #fff; border-color: var(--positive); }
.sent-btn.active.neg { background: var(--negative); color: #fff; border-color: var(--negative); }
.sent-btn.active.neu { background: var(--neutral); color: #fff; border-color: var(--neutral); }
.sent-btn.active.pos .dot, .sent-btn.active.neg .dot, .sent-btn.active.neu .dot { background: #fff; }
.sent-btn.active.all-btn { background: var(--card); border-color: var(--accent); color: var(--accent); }
.sent-btn.all-btn svg { width: 14px; height: 14px; stroke: var(--muted); }
.sent-btn.active.all-btn svg { stroke: var(--accent); }

.filter-toggle {
    display: flex; align-items: center; justify-content: center;
    padding: 6px 10px; border-radius: 20px; border: 1.5px solid var(--border);
    background: var(--card); font-family: inherit; font-size: .75rem; font-weight: 600;
    color: var(--muted); cursor: pointer; transition: all .15s; position: relative;
}
.filter-toggle:hover { border-color: #aaa; color: var(--text); }
.filter-toggle.has-filter { border-color: var(--accent); color: var(--accent); }
.filter-toggle svg { width: 14px; height: 14px; }
.filter-badge {
    position: absolute; top: -5px; right: -5px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-size: .6rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
}

/* Active filter chips */
.active-chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 18px; justify-content: center; }
.active-chips:empty { display: none; }
.chip {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 20px;
    font-size: .7rem; font-weight: 600;
    background: #f0efeb; color: var(--text); border: 1px solid var(--border);
}
.chip-remove {
    width: 14px; height: 14px; border: none; background: none;
    cursor: pointer; color: var(--muted); font-size: .8rem; line-height: 1;
    padding: 0; margin-left: 2px;
}
.chip-remove:hover { color: var(--negative); }

/* Filter dropdown — lives in #filterDropdownAnchor, outside flex row */
#filterDropdownAnchor { position: relative; }
#filterDropdownAnchor .filter-dropdown {
    display: none; position: absolute; top: 0; right: 0;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    box-shadow: 0 8px 30px rgba(0,0,0,.1); padding: 16px; z-index: 100;
    min-width: 260px;
}
#filterDropdownAnchor.open .filter-dropdown { display: block; }
.filter-section { margin-bottom: 14px; }
.filter-section:last-child { margin-bottom: 0; }
.filter-section-title {
    font-size: .65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .8px; color: var(--muted); margin-bottom: 8px;
}
.filter-options { display: flex; flex-direction: column; gap: 4px; }
.filter-option {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 10px; border-radius: 6px; border: none;
    background: none; font-family: inherit; font-size: .78rem; font-weight: 500;
    color: var(--text); cursor: pointer; transition: background .1s; text-align: left; width: 100%;
}
.filter-option:hover { background: #f5f5f3; }
.filter-option.active { background: #f0efeb; font-weight: 700; }
.filter-option .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.filter-option .opt-count { margin-left: auto; font-size: .68rem; color: var(--muted); font-weight: 500; }
.filter-option.disabled { opacity: .35; pointer-events: none; }

/* Calendar grid */
.cal-header { display: flex; align-items: center; justify-content: space-between; padding: 4px 0 8px; }
.cal-header .cal-title { font-size: .78rem; font-weight: 700; }
.cal-header button { background: none; border: none; cursor: pointer; padding: 2px 6px; font-size: .85rem; color: var(--muted); border-radius: 4px; }
.cal-header button:hover { background: #f0efeb; color: var(--text); }
.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
.cal-grid .cal-day-name { font-size: .6rem; font-weight: 700; color: var(--muted); padding: 2px 0 6px; }
.cal-grid .cal-day {
    padding: 6px 2px; border-radius: 6px; border: none; background: none;
    font-family: inherit; font-size: .74rem; font-weight: 500; color: var(--text);
    cursor: pointer; transition: all .1s;
}
.cal-grid .cal-day:hover { background: #f0efeb; }
.cal-grid .cal-day.active { background: var(--accent); color: #fff; font-weight: 700; }
.cal-grid .cal-day.disabled { opacity: .25; pointer-events: none; }
.cal-grid .cal-day.has-content { font-weight: 700; }


/* Loading */
.loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: .85rem; }
.loading .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

.empty { text-align: center; padding: 60px 0; color: var(--muted); font-size: .85rem; }

/* Date divider */
.date-divider { display: flex; align-items: center; gap: 16px; margin: 28px 0 18px; }
.date-divider:first-child { margin-top: 0; }
.date-divider .line { flex: 1; height: 1px; background: var(--border); }
.date-divider .label { font-size: .75rem; font-weight: 600; color: var(--muted); white-space: nowrap; letter-spacing: .3px; }

/* Cards */
.mentions { display: flex; flex-direction: column; gap: 14px; padding: 0 0 16px 44px; }
.mention-card {
    background: rgba(255,255,255,.45); border: none; border-radius: 12px;
    padding: 20px 22px; position: relative; transition: all .2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.03);
}
.mention-card:hover { background: rgba(255,255,255,.7); box-shadow: 0 2px 12px rgba(0,0,0,.06); }

/* Priority marker — small rounded square, vertically centered outside card */
.priority-marker {
    position: absolute; left: -40px; top: 50%; transform: translateY(-50%);
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; font-size: .68rem; font-weight: 700; letter-spacing: .4px;
    border-radius: 10px; user-select: none;
    transition: transform .15s;
}
.priority-marker.p0 { background: #dc2626; color: #fff; box-shadow: 0 1px 4px rgba(220,38,38,.25); }
.priority-marker.p1 { background: #f59e0b; color: #fff; box-shadow: 0 1px 4px rgba(245,158,11,.25); }
.priority-marker.p2 { background: transparent; color: #b8b4ab; border: 1.5px solid #d9d5cb; }
.mention-card:hover .priority-marker { transform: translateY(-50%) scale(1.04); }

.card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.card-tag { font-size: .68rem; font-weight: 500; color: var(--muted); margin-left: auto; }
.sentiment-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.positive .sentiment-dot { background: var(--positive); }
.negative .sentiment-dot { background: var(--negative); }
.neutral  .sentiment-dot { background: var(--neutral); }

/* Sensitivity badges */
.sensitivity-badge { font-size: .62rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 2px 7px; border-radius: 4px; line-height: 1; }
.sensitivity-critical { background: #dc2626; color: #fff; }
.sensitivity-high { background: #f59e0b; color: #fff; }
.sensitivity-medium { background: #6b7280; color: #fff; }
.sensitivity-critical-card { border-left: 3px solid #dc2626; }
.sensitivity-high-card { border-left: 3px solid #f59e0b; }

/* Source type tags */
.source-tag { font-size: .62rem; font-weight: 600; padding: 2px 6px; border-radius: 4px; color: #555; background: #f0f0ee; line-height: 1; }
.source-government { background: #fef2f2; color: #991b1b; }
.source-news_major { background: #eff6ff; color: #1e40af; }
.source-financial { background: #f0fdf4; color: #166534; }

.card-meta { font-size: .72rem; color: var(--muted); }
.card-meta a { text-decoration: none; font-weight: 600; }
.positive .card-meta a { color: var(--positive); }
.negative .card-meta a { color: var(--negative); }
.neutral  .card-meta a { color: var(--neutral); }
.card-meta a:hover { text-decoration: underline; }
.card-meta .sep { margin: 0 5px; opacity: .4; }

.card-quote { font-size: .88rem; line-height: 1.7; color: #2a2a2a; margin-bottom: 12px; }

.card-details { display: none; margin-bottom: 12px; padding: 14px 16px; background: #fafaf8; border: 1px solid var(--border); border-radius: 8px; font-size: .85rem; line-height: 1.7; color: #333; }
.card-details.open { display: block; animation: fadeIn .15s ease; }
.card-details .original-label { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

.details-btn {
    font-size: .68rem; font-weight: 600; color: var(--text);
    background: var(--card); border: 1.5px solid var(--border); border-radius: 6px;
    padding: 4px 10px; cursor: pointer; transition: all .15s; font-family: inherit;
}
.details-btn:hover { border-color: #aaa; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.details-btn.open { background: var(--text); color: #fff; border-color: var(--text); }

/* Archive date picker — Google-style pagination */
.archive-section { margin-top: 48px; padding: 32px 0 64px; border-top: 1px solid var(--border); text-align: center; }
.archive-section h2 { font-size: .82rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }
.archive-dates { display: flex; gap: 8px; justify-content: center; align-items: center; }
.archive-date-btn {
    padding: 8px 18px; border-radius: 8px; border: 1.5px solid var(--border);
    background: var(--card); font-family: inherit; font-size: .78rem; font-weight: 500;
    color: var(--text); cursor: pointer; transition: all .15s; min-width: 62px;
}
.archive-date-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.archive-date-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.archive-date-btn .day { font-weight: 700; font-size: .85rem; display: block; }
.archive-date-btn .month { font-size: .65rem; color: inherit; opacity: .7; }
.archive-nav {
    width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--border);
    background: var(--card); cursor: pointer; transition: all .15s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.archive-nav:hover { border-color: var(--accent); background: #faf8f6; }
.archive-nav svg { width: 16px; height: 16px; stroke: var(--muted); transition: stroke .15s; }
.archive-nav:hover svg { stroke: var(--accent); }
.archive-nav.disabled { opacity: .3; pointer-events: none; }

@media (max-width: 600px) {
    .container { padding: 0 14px; }

    header { padding: 28px 0 10px; }
    header h1 { font-size: 1.25rem; }

    /* Sentiment buttons — wrap on small screens */
    .sentiment-btns { flex-wrap: wrap; gap: 6px; padding: 10px 0 20px; }
    .sent-btn { padding: 5px 12px; font-size: .7rem; }
    .sent-btn .count { font-size: .6rem; }

    /* Filter dropdown — full width on mobile */
    #filterDropdownAnchor .filter-dropdown {
        right: auto; left: 0; min-width: unset; width: 100%;
        padding: 14px; max-height: 60vh; overflow-y: auto;
    }

    /* Cards */
    .mentions { padding: 0 0 16px 32px; }
    .priority-marker { left: -28px; width: 24px; height: 24px; font-size: .58rem; letter-spacing: .3px; border-radius: 7px; }
    .mention-card { padding: 14px 16px; }
    .card-quote { font-size: .82rem; line-height: 1.6; }
    .card-meta { font-size: .68rem; }
    .card-details { padding: 10px 12px; font-size: .8rem; }
    .details-btn { font-size: .64rem; padding: 3px 8px; }

    /* Date divider */
    .date-divider { gap: 10px; margin: 20px 0 14px; }
    .date-divider .label { font-size: .7rem; }

    /* Archive — scroll horizontally */
    .archive-section { margin-top: 32px; padding: 24px 0 48px; }
    .archive-section h2 { font-size: .75rem; margin-bottom: 12px; }
    .archive-dates { gap: 6px; }
    .archive-date-btn { padding: 6px 10px; min-width: 48px; font-size: .72rem; }
    .archive-date-btn .day { font-size: .78rem; }
    .archive-date-btn .month { font-size: .6rem; }
    .archive-nav { width: 34px; height: 34px; }
    .archive-nav svg { width: 14px; height: 14px; }

    /* Chips */
    .active-chips { gap: 4px; margin-bottom: 14px; }
    .chip { font-size: .65rem; padding: 3px 8px; }
}
    </style>
</head>
<body>
    <div class="lang-toggle" id="langToggle"></div>

    <div class="container">
        <header>
            <h1 id="siteTitle">Social Listening</h1>
        </header>

        <div class="sentiment-btns" id="sentimentBtns"></div>
        <div id="filterDropdownAnchor"></div>

        <div class="active-chips" id="activeChips"></div>

        <div id="content">
            <div class="loading" id="loadingBlock"><div class="spinner"></div><span id="loadingText">Loading mentions...</span></div>
        </div>

        <div class="archive-section" id="archiveSection" style="display:none">
            <h2 id="archiveTitle">Browse by date</h2>
            <div class="archive-dates" id="archiveDates"></div>
        </div>
    </div>

    <script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? '' : 'https://duflat-production.up.railway.app';

// Warm up Railway immediately — fire-and-forget, no await
if (API) fetch(API + '/ping').catch(() => {});

let allMentions = [];
let allDates = [];
let currentFilter = 'all';
let currentLang = 'all';
let currentDateFilter = null;
let filterOpen = false;
let archivePage = 0;
const DATES_PER_PAGE = 4;
let filterMonth = null;
let currentSensitivity = 'all';
let currentSourceType = 'all';
let showMonths = false;

const CACHE_KEY = 'social_mentions_cache';
const CACHE_TTL = 5 * 60 * 1000;

// ─────────────────────────────────────────────
// I18N — English + Simplified Chinese UI
// Mention content itself (content_english / content_original) is NEVER translated.
// ─────────────────────────────────────────────
const I18N = {
    en: {
        title: 'Social Listening',
        loading: 'Loading mentions...',
        failedLoad: 'Failed to load.',
        retry: 'Retry',
        noMentions: 'No mentions found.',
        tryClearing: ' Try clearing filters.',
        browseByDate: 'Browse by date',
        all: 'All',
        positive: 'Positive',
        negative: 'Negative',
        neutral: 'Neutral',
        filterLanguage: 'Language',
        filterPriority: 'Priority',
        filterDate: 'Date',
        filterMonth: 'Month',
        unknownDate: 'Unknown date',
        unknownLang: 'Unknown',
        close: 'Close',
        original: 'Original',
        olderTitle: 'Older',
        newerTitle: 'Newer',
        allDatesTop: 'All',
        allDatesBottom: 'dates',
        months: ['January','February','March','April','May','June','July','August','September','October','November','December'],
        dayShort: ['S','M','T','W','T','F','S'],
        langs: {},
        dateLocale: 'en-US',
    },
    zh: {
        title: '社交聆听',
        loading: '正在加载内容...',
        failedLoad: '加载失败。',
        retry: '重试',
        noMentions: '未找到内容。',
        tryClearing: '请尝试清除筛选条件。',
        browseByDate: '按日期浏览',
        all: '全部',
        positive: '正面',
        negative: '负面',
        neutral: '中性',
        filterLanguage: '语言',
        filterPriority: '优先级',
        filterDate: '日期',
        filterMonth: '月份',
        unknownDate: '未知日期',
        unknownLang: '未知',
        close: '关闭',
        original: '原文',
        olderTitle: '较新',
        newerTitle: '较旧',
        allDatesTop: '全部',
        allDatesBottom: '日期',
        months: ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],
        dayShort: ['日','一','二','三','四','五','六'],
        langs: {
            English: '英语', Japanese: '日语', Arabic: '阿拉伯语',
            'Traditional Chinese': '繁体中文', 'Simplified Chinese': '简体中文',
            Chinese: '中文', Turkish: '土耳其语', Russian: '俄语',
            Spanish: '西班牙语', Portuguese: '葡萄牙语', Korean: '韩语',
            French: '法语', German: '德语', Italian: '意大利语',
            Hindi: '印地语', Thai: '泰语', Vietnamese: '越南语',
            Indonesian: '印尼语', Dutch: '荷兰语', Polish: '波兰语',
            Unknown: '未知',
        },
        dateLocale: 'zh-CN',
    },
};

function detectInitialLang() {
    try {
        const saved = localStorage.getItem('ui_lang');
        if (saved === 'zh' || saved === 'en') return saved;
    } catch (e) {}
    const nav = ((navigator.language || navigator.userLanguage || 'en') + '').toLowerCase();
    return nav.startsWith('zh') ? 'zh' : 'en';
}

let uiLang = detectInitialLang();
document.documentElement.lang = (uiLang === 'zh' ? 'zh-CN' : 'en');

function T(k) {
    const v = I18N[uiLang] && I18N[uiLang][k];
    if (v !== undefined) return v;
    return (I18N.en[k] !== undefined ? I18N.en[k] : k);
}

function TL(lang) {
    if (!lang || lang === 'Unknown') return T('unknownLang');
    if (uiLang === 'zh') {
        return I18N.zh.langs[lang] || lang;
    }
    return lang;
}

function setUILang(l) {
    if (l !== 'en' && l !== 'zh') return;
    uiLang = l;
    try { localStorage.setItem('ui_lang', l); } catch (e) {}
    document.documentElement.lang = (l === 'zh' ? 'zh-CN' : 'en');
    document.title = 'Duflat — ' + T('title');
    const titleEl = document.getElementById('siteTitle');
    if (titleEl) titleEl.textContent = T('title');
    const archTitle = document.getElementById('archiveTitle');
    if (archTitle) archTitle.textContent = T('browseByDate');
    renderLangToggle();
    renderAll();
}

function renderLangToggle() {
    const el = document.getElementById('langToggle');
    if (!el) return;
    el.innerHTML =
        `<button class="lang-btn ${uiLang==='en'?'active':''}" onclick="setUILang('en')">EN</button>` +
        `<button class="lang-btn ${uiLang==='zh'?'active':''}" onclick="setUILang('zh')">中文</button>`;
}

function _applyData(data) {
    const today = new Date().toISOString().slice(0, 10);
    const mentions = (data.mentions || []).filter(m => !m.content_date || m.content_date <= today);
    mentions.sort((a, b) => (b.content_date || '').localeCompare(a.content_date || ''));
    allMentions = mentions;
    const raw = (data.available_dates || []).filter(d => d <= today);
    allDates = raw.sort((a, b) => b.localeCompare(a));
    renderAll();
}

async function loadMentions() {
    try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
        if (cached && cached.data && (Date.now() - cached.ts) < CACHE_TTL) {
            _applyData(cached.data);
        } else if (cached && cached.data) {
            _applyData(cached.data);
        } else {
            document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div>${escapeHtml(T('loading'))}</div>`;
        }
    } catch (e) {
        document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div>${escapeHtml(T('loading'))}</div>`;
    }

    try {
        const resp = await fetch(`${API}/social/mentions?days=365`);
        const data = await resp.json();
        localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
        _applyData(data);
    } catch (e) {
        if (!allMentions.length) {
            document.getElementById('content').innerHTML = `<div class="empty">${escapeHtml(T('failedLoad'))} <a href="#" onclick="loadMentions();return false">${escapeHtml(T('retry'))}</a></div>`;
        }
    }
}

function renderAll() {
    renderSentimentBtns();
    renderFilterDropdown();
    renderActiveChips();
    renderMentions();
    renderArchive();
    updateFilterToggle();
}

function renderSentimentBtns() {
    const base = currentDateFilter ? allMentions.filter(m => m.content_date === currentDateFilter) : allMentions;
    const filtered = currentLang !== 'all' ? base.filter(m => (m.language || 'Unknown') === currentLang) : base;
    const pos = filtered.filter(m => m.sentiment === 'positive').length;
    const neg = filtered.filter(m => m.sentiment === 'negative').length;
    const neu = filtered.filter(m => m.sentiment === 'neutral').length;

    document.getElementById('sentimentBtns').innerHTML =
        `<button class="sent-btn all-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">${escapeHtml(T('all'))} <span class="count">${filtered.length}</span></button>` +
        `<button class="sent-btn pos ${currentFilter==='positive'?'active':''}" onclick="setFilter('positive')">
            <span class="dot" style="background:var(--positive)"></span>${escapeHtml(T('positive'))} <span class="count">${pos}</span>
        </button>` +
        `<button class="sent-btn neg ${currentFilter==='negative'?'active':''}" onclick="setFilter('negative')">
            <span class="dot" style="background:var(--negative)"></span>${escapeHtml(T('negative'))} <span class="count">${neg}</span>
        </button>` +
        `<button class="sent-btn neu ${currentFilter==='neutral'?'active':''}" onclick="setFilter('neutral')">
            <span class="dot" style="background:var(--neutral)"></span>${escapeHtml(T('neutral'))} <span class="count">${neu}</span>
        </button>` +
        `<button class="filter-toggle" id="filterToggle" onclick="toggleFilterPanel(event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
        </button>`;
}

function toggleFilterPanel(e) {
    if (e) e.stopPropagation();
    filterOpen = !filterOpen;
    const anchor = document.getElementById('filterDropdownAnchor');
    anchor.classList.toggle('open', filterOpen);
}

document.addEventListener('click', function(e) {
    if (!filterOpen) return;
    const anchor = document.getElementById('filterDropdownAnchor');
    const toggle = document.getElementById('filterToggle');
    if (anchor.contains(e.target) || (toggle && toggle.contains(e.target))) return;
    filterOpen = false;
    anchor.classList.remove('open');
});

function updateFilterToggle() {
    const btn = document.getElementById('filterToggle');
    const count = (currentLang !== 'all' ? 1 : 0) + (currentDateFilter ? 1 : 0) + (currentSensitivity !== 'all' ? 1 : 0) + (currentSourceType !== 'all' ? 1 : 0);
    btn.classList.toggle('has-filter', count > 0);
    const existing = btn.querySelector('.filter-badge');
    if (existing) existing.remove();
    if (count > 0) {
        const badge = document.createElement('span');
        badge.className = 'filter-badge';
        badge.textContent = count;
        btn.appendChild(badge);
    }
}

function renderFilterDropdown() {
    const base = currentDateFilter ? allMentions.filter(m => m.content_date === currentDateFilter) : allMentions;

    const langs = {};
    base.forEach(m => {
        const lang = m.language || 'Unknown';
        langs[lang] = (langs[lang] || 0) + 1;
    });
    const langKeys = Object.keys(langs).sort();

    let html = `<div class="filter-section">
        <div class="filter-section-title">${escapeHtml(T('filterLanguage'))}</div>
        <div class="filter-options">
            <button class="filter-option ${currentLang==='all'?'active':''}" onclick="setLang('all')">${escapeHtml(T('all'))}<span class="opt-count">${base.length}</span></button>`;
    langKeys.forEach(lang => {
        html += `<button class="filter-option ${currentLang===lang?'active':''}" onclick="setLang('${escapeHtml(lang)}')">${escapeHtml(TL(lang))}<span class="opt-count">${langs[lang]}</span></button>`;
    });
    html += `</div></div>`;

    const priorityCounts = { p0: 0, p1: 0, p2: 0 };
    base.forEach(m => {
        priorityCounts[sensToPriority(m.sensitivity)]++;
    });
    const priOrder = ['p0','p1','p2'];
    const priLabels = {p0:'P0',p1:'P1',p2:'P2'};
    html += `<div class="filter-section">
        <div class="filter-section-title">${escapeHtml(T('filterPriority'))}</div>
        <div class="filter-options">
            <button class="filter-option ${currentSensitivity==='all'?'active':''}" onclick="setSensitivity('all')">${escapeHtml(T('all'))}<span class="opt-count">${base.length}</span></button>`;
    priOrder.forEach(p => {
        if (priorityCounts[p]) {
            html += `<button class="filter-option ${currentSensitivity===p?'active':''}" onclick="setSensitivity('${p}')">${priLabels[p]}<span class="opt-count">${priorityCounts[p]}</span></button>`;
        }
    });
    html += `</div></div>`;

    const dateSet = new Set(allDates);
    const monthNames = I18N[uiLang].months;
    const dayShort = I18N[uiLang].dayShort;

    html += `<div class="filter-section">
        <div class="filter-section-title">${escapeHtml(T('filterDate'))}</div>
        <div class="filter-options">
            <button class="filter-option ${!currentDateFilter && filterMonth===null?'active':''}" onclick="filterSelectYear()">2026<span class="opt-count">${allMentions.length}</span></button>`;

    html += `<button class="filter-option${showMonths && filterMonth===null?' active':''}" onclick="toggleMonths(event)" style="padding-left:20px">${escapeHtml(T('filterMonth'))}</button>`;

    if (showMonths && filterMonth === null) {
        const monthCounts = {};
        allMentions.forEach(m => {
            if (!m.content_date) return;
            const mo = parseInt(m.content_date.slice(5, 7), 10) - 1;
            monthCounts[mo] = (monthCounts[mo] || 0) + 1;
        });
        const currentMonth = new Date().getMonth();
        for (let mo = 0; mo < 12; mo++) {
            const isFuture = mo > currentMonth;
            const cls = isFuture ? 'filter-option disabled' : 'filter-option';
            html += `<button class="${cls}" onclick="filterSelectMonth(event,${mo})" style="padding-left:36px">${escapeHtml(monthNames[mo])}</button>`;
        }
    } else if (filterMonth !== null) {
        const mo = filterMonth;
        const daysInMonth = new Date(2026, mo + 1, 0).getDate();
        const firstDay = new Date(2026, mo, 1).getDay();
        html += `</div>
        <div class="cal-header">
            <button onclick="filterCalPrev(event)">&#8249;</button>
            <span class="cal-title">${escapeHtml(monthNames[mo])} 2026</span>
            <button onclick="filterCalNext(event)">&#8250;</button>
        </div>
        <div class="cal-grid">`;
        dayShort.forEach(d => { html += `<div class="cal-day-name">${escapeHtml(d)}</div>`; });
        for (let i = 0; i < firstDay; i++) html += `<div></div>`;
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `2026-${String(mo + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const hasContent = dateSet.has(dateStr);
            const isActive = currentDateFilter === dateStr;
            let cls = 'cal-day';
            if (!hasContent) cls += ' disabled';
            else cls += ' has-content';
            if (isActive) cls += ' active';
            html += `<button class="${cls}" onclick="filterPickDate('${dateStr}')">${d}</button>`;
        }
        html += `</div>`;
    }
    html += `</div>`;

    const anchor = document.getElementById('filterDropdownAnchor');
    let dropdown = anchor.querySelector('.filter-dropdown');
    if (!dropdown) {
        anchor.innerHTML = '<div class="filter-dropdown"></div>';
        dropdown = anchor.querySelector('.filter-dropdown');
    }
    dropdown.innerHTML = html;
    if (filterOpen) anchor.classList.add('open');
}

function renderActiveChips() {
    let html = '';
    if (currentLang !== 'all') {
        html += `<span class="chip">${escapeHtml(TL(currentLang))}<button class="chip-remove" onclick="setLang('all')">&times;</button></span>`;
    }
    if (currentDateFilter) {
        const dt = new Date(currentDateFilter + 'T00:00:00');
        const label = dt.toLocaleDateString(I18N[uiLang].dateLocale, { month: 'short', day: 'numeric' });
        html += `<span class="chip">${escapeHtml(label)}<button class="chip-remove" onclick="selectDate(null)">&times;</button></span>`;
    }
    if (currentSensitivity !== 'all') {
        const priLabels = {p0:'P0',p1:'P1',p2:'P2'};
        html += `<span class="chip">${priLabels[currentSensitivity] || currentSensitivity}<button class="chip-remove" onclick="setSensitivity('all')">&times;</button></span>`;
    }
    document.getElementById('activeChips').innerHTML = html;
}

function sensToPriority(s) {
    if (s === 'critical') return 'p0';
    if (s === 'high') return 'p1';
    return 'p2';
}

function getFilteredMentions() {
    let list = allMentions;
    if (currentDateFilter) list = list.filter(m => m.content_date === currentDateFilter);
    if (currentFilter !== 'all') list = list.filter(m => m.sentiment === currentFilter);
    if (currentLang !== 'all') list = list.filter(m => (m.language || 'Unknown') === currentLang);
    if (currentSensitivity !== 'all') list = list.filter(m => sensToPriority(m.sensitivity) === currentSensitivity);
    if (currentSourceType !== 'all') list = list.filter(m => (m.source_type || 'news_minor') === currentSourceType);
    return list;
}

function renderMentions() {
    const el = document.getElementById('content');
    const filtered = getFilteredMentions();

    if (filtered.length === 0) {
        const hint = currentFilter !== 'all' || currentLang !== 'all' ? T('tryClearing') : '';
        el.innerHTML = `<div class="empty">${escapeHtml(T('noMentions'))}${escapeHtml(hint)}</div>`;
        return;
    }

    const items = currentDateFilter ? filtered : filtered.slice(0, 10);

    const grouped = {};
    items.forEach(m => {
        const d = m.content_date || 'Unknown';
        if (!grouped[d]) grouped[d] = [];
        grouped[d].push(m);
    });

    let html = '<div class="mentions">';
    const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

    dates.forEach(date => {
        html += `<div class="date-divider"><span class="line"></span><span class="label">${escapeHtml(formatDateLong(date))}</span><span class="line"></span></div>`;
        grouped[date].forEach((m, i) => {
            html += renderCard(m, `${date}-${i}`);
        });
    });

    html += '</div>';
    el.innerHTML = html;
}

function renderCard(m, uid) {
    const s = m.sentiment || 'neutral';
    const sensitivity = m.sensitivity || 'low';
    const rawLang = m.language || 'Unknown';
    const langDisplay = TL(rawLang);
    const closeLabel = T('close');

    const displayQuote = (uiLang === 'zh' && m.content_chinese)
        ? m.content_chinese
        : (m.content_english || m.content_original || '');

    const hasOriginal = m.content_original && m.content_original !== m.content_english;
    const detailsHtml = hasOriginal
        ? `<div class="card-details" id="det-${uid}"><div class="original-label">${escapeHtml(T('original'))} (${escapeHtml(langDisplay)})</div>${escapeHtml(m.content_original)}</div>`
        : '';
    const detailsBtn = hasOriginal
        ? `<button class="details-btn" onclick="toggleDetails('det-${uid}',this,'${escapeHtml(langDisplay)}','${escapeHtml(closeLabel)}')">${escapeHtml(langDisplay)}</button>`
        : '';

    const priorityMap = { critical: 'p0', high: 'p1', medium: 'p2', low: 'p2' };
    const priorityLabels = { critical: 'P0', high: 'P1', medium: 'P2', low: 'P2' };
    const priorityClass = priorityMap[sensitivity] || 'p2';
    const priorityLabel = priorityLabels[sensitivity] || 'P2';
    const priorityMarker = `<div class="priority-marker ${priorityClass}" title="${sensitivity || 'low'}">${priorityLabel}</div>`;

    return `<div class="mention-card ${s}">
        ${priorityMarker}
        <div class="card-top">
            <span class="sentiment-dot"></span>
            <span class="card-meta"><a href="${escapeHtml(m.url)}" target="_blank" rel="noopener">${escapeHtml(m.platform || '')}</a></span>
            <span style="flex:1"></span>
            ${detailsBtn}
        </div>
        <div class="card-quote">${escapeHtml(displayQuote)}</div>
        ${detailsHtml}
    </div>`;
}

function renderArchive() {
    if (allDates.length === 0) {
        document.getElementById('archiveSection').style.display = 'none';
        return;
    }
    document.getElementById('archiveSection').style.display = '';
    const archTitle = document.getElementById('archiveTitle');
    if (archTitle) archTitle.textContent = T('browseByDate');
    const container = document.getElementById('archiveDates');

    const start = archivePage * DATES_PER_PAGE;
    const end = Math.min(start + DATES_PER_PAGE, allDates.length);
    const pageDates = allDates.slice(start, end);
    const hasPrev = archivePage > 0;
    const hasNext = end < allDates.length;

    const prevSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
    const nextSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>`;

    let html = '';

    html += `<button class="archive-nav ${hasPrev ? '' : 'disabled'}" onclick="archivePrev()" title="${escapeHtml(T('newerTitle'))}">${prevSvg}</button>`;

    html += `<button class="archive-date-btn ${!currentDateFilter?'active':''}" onclick="selectDate(null)">
        <span class="day">${escapeHtml(T('allDatesTop'))}</span><span class="month">${escapeHtml(T('allDatesBottom'))}</span>
    </button>`;

    pageDates.forEach(d => {
        const dt = new Date(d + 'T00:00:00');
        const day = dt.getDate();
        const month = dt.toLocaleDateString(I18N[uiLang].dateLocale, { month: 'short' });
        html += `<button class="archive-date-btn ${currentDateFilter===d?'active':''}" onclick="selectDate('${d}')">
            <span class="day">${day}</span><span class="month">${escapeHtml(month)}</span>
        </button>`;
    });

    html += `<button class="archive-nav ${hasNext ? '' : 'disabled'}" onclick="archiveNext()" title="${escapeHtml(T('olderTitle'))}">${nextSvg}</button>`;

    container.innerHTML = html;
}

function archiveNext() {
    const totalPages = Math.ceil(allDates.length / DATES_PER_PAGE);
    if (archivePage < totalPages - 1) {
        const archive = document.getElementById('archiveSection');
        const y = archive.getBoundingClientRect().top;
        archivePage++;
        renderArchive();
        const drift = archive.getBoundingClientRect().top - y;
        if (Math.abs(drift) > 2) window.scrollBy(0, drift);
    }
}

function archivePrev() {
    if (archivePage > 0) {
        const archive = document.getElementById('archiveSection');
        const y = archive.getBoundingClientRect().top;
        archivePage--;
        renderArchive();
        const drift = archive.getBoundingClientRect().top - y;
        if (Math.abs(drift) > 2) window.scrollBy(0, drift);
    }
}

function selectDate(date) {
    const archive = document.getElementById('archiveSection');
    const archiveViewY = archive.getBoundingClientRect().top;

    currentDateFilter = date;
    currentFilter = 'all';
    currentLang = 'all';
    if (!date) { archivePage = 0; filterMonth = null; }
    else { filterMonth = parseInt(date.slice(5, 7), 10) - 1; }
    renderAll();

    const newArchiveY = archive.getBoundingClientRect().top;
    const drift = newArchiveY - archiveViewY;
    if (Math.abs(drift) > 2) {
        window.scrollBy(0, drift);
    }
}

function setFilter(sentiment) {
    currentFilter = sentiment;
    renderAll();
}

function setLang(lang) {
    currentLang = lang;
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    renderAll();
}

function setSensitivity(val) {
    currentSensitivity = val;
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    renderAll();
}

function setSourceType(val) {
    currentSourceType = val;
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    renderAll();
}

function filterSelectYear() {
    filterMonth = null;
    showMonths = false;
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    selectDate(null);
}

function toggleMonths(e) {
    if (e) e.stopPropagation();
    showMonths = !showMonths;
    filterMonth = null;
    renderFilterDropdown();
}

function filterSelectMonth(e, mo) {
    if (e) e.stopPropagation();
    filterMonth = mo;
    showMonths = false;
    renderFilterDropdown();
}

function filterBackToMonths() {
    filterMonth = null;
    showMonths = true;
    renderFilterDropdown();
}

function filterCalPrev(e) {
    if (e) e.stopPropagation();
    if (filterMonth > 0) { filterMonth--; renderFilterDropdown(); }
}

function filterCalNext(e) {
    if (e) e.stopPropagation();
    const currentMonth = new Date().getMonth();
    if (filterMonth < currentMonth) { filterMonth++; renderFilterDropdown(); }
}

function filterPickDate(dateStr) {
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    selectDate(dateStr);
}

function toggleDetails(id, btn, label, closeLabel) {
    const panel = document.getElementById(id);
    if (!panel) return;
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.textContent = isOpen ? closeLabel : label;
}

function formatDateLong(d) {
    if (!d || d === 'Unknown') return T('unknownDate');
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString(I18N[uiLang].dateLocale, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return (str + '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Init ───
document.title = 'Duflat — ' + T('title');
const _titleEl = document.getElementById('siteTitle');
if (_titleEl) _titleEl.textContent = T('title');
const _loadingTxt = document.getElementById('loadingText');
if (_loadingTxt) _loadingTxt.textContent = T('loading');
const _archTitle = document.getElementById('archiveTitle');
if (_archTitle) _archTitle.textContent = T('browseByDate');

renderLangToggle();
loadMentions();
    </script>
</body>
