<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duflat — Bilibili Social Listening</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f5f5f3;
            --card: #ffffff;
            --border: #e5e5e3;
            --text: #1a1a1a;
            --muted: #888;
            --positive: #16a34a;
            --negative: #dc2626;
            --neutral: #ca8a04;
            --accent: #c15f3c;
        }

        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 780px; margin: 0 auto; padding: 0 20px; }

        header { padding: 48px 0 20px; text-align: center; }
        header h1 { font-family: 'Merriweather', serif; font-size: 1.6rem; font-weight: 900; }

        /* Overview */
        .overview { text-align: center; padding: 18px 0; margin: 8px 0 20px; font-size: .82rem; color: var(--muted); border-bottom: 1px solid var(--border); }
        .overview strong { color: var(--text); font-weight: 700; }
        .overview .sep { margin: 0 10px; color: #ccc; }
        .overview .pos { color: var(--positive); font-weight: 600; }
        .overview .neg { color: var(--negative); font-weight: 600; }
        .overview .neu { color: var(--neutral); font-weight: 600; }

        /* Filters */
        .filters { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 20px; border-radius: 8px; border: 2px solid var(--border);
            background: var(--card); font-family: inherit; font-size: .82rem; font-weight: 600;
            color: var(--muted); cursor: pointer; transition: all .15s; user-select: none;
        }
        .filter-btn:hover { border-color: #aaa; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }
        .filter-btn .count { font-size: .7rem; font-weight: 500; margin-left: 4px; opacity: .7; }

        /* Date picker */
        .date-bar { display: flex; gap: 8px; justify-content: center; align-items: center; margin-bottom: 20px; flex-wrap: wrap; }
        .date-bar label { font-size: .78rem; color: var(--muted); font-weight: 500; }
        .date-bar select {
            padding: 6px 12px; border-radius: 6px; border: 1.5px solid var(--border);
            font-family: inherit; font-size: .78rem; background: var(--card); cursor: pointer;
        }
        .date-bar select:focus { outline: none; border-color: var(--accent); }

        .updated { text-align: center; font-size: .72rem; color: #aaa; margin-bottom: 20px; }

        /* Loading */
        .loading { text-align: center; padding: 60px 0; color: var(--muted); font-size: .85rem; }
        .loading .spinner { width: 24px; height: 24px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty { text-align: center; padding: 60px 0; color: var(--muted); font-size: .85rem; }

        /* Cards */
        .mentions { display: flex; flex-direction: column; gap: 14px; padding-bottom: 64px; }
        .mention-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 20px 22px; position: relative; border-left: 4px solid transparent; transition: box-shadow .2s;
        }
        .mention-card:hover { box-shadow: 0 3px 16px rgba(0,0,0,.05); }
        .mention-card.positive { border-left-color: var(--positive); }
        .mention-card.negative { border-left-color: var(--negative); }
        .mention-card.neutral  { border-left-color: var(--neutral); }

        .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
        .sentiment-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
        .positive .sentiment-dot { background: var(--positive); }
        .negative .sentiment-dot { background: var(--negative); }
        .neutral  .sentiment-dot { background: var(--neutral); }
        .sentiment-label { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .3px; }
        .positive .sentiment-label { color: var(--positive); }
        .negative .sentiment-label { color: var(--negative); }
        .neutral  .sentiment-label { color: var(--neutral); }

        .platform-link {
            font-size: .72rem; font-weight: 600; color: var(--accent);
            padding: 2px 8px; background: rgba(193,95,60,.06); border: 1px solid rgba(193,95,60,.15);
            border-radius: 4px; text-decoration: none; transition: all .15s;
        }
        .platform-link:hover { background: rgba(193,95,60,.12); border-color: rgba(193,95,60,.35); }

        .lang-badge { font-size: .68rem; font-weight: 500; color: var(--muted); padding: 2px 7px; background: #f3f3f1; border-radius: 4px; }
        .card-top .date { margin-left: auto; font-size: .72rem; color: #aaa; }
        .card-author { font-size: .78rem; color: var(--muted); margin-bottom: 10px; }
        .card-quote { font-size: .9rem; line-height: 1.7; color: #2a2a2a; margin-bottom: 12px; }

        .card-details { display: none; margin-bottom: 12px; padding: 14px 16px; background: #fafaf8; border: 1px solid var(--border); border-radius: 8px; font-size: .85rem; line-height: 1.7; color: #333; }
        .card-details.open { display: block; animation: fadeIn .2s ease; }
        .card-details .original-label { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 6px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

        .card-bottom { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .tag { font-size: .67rem; font-weight: 500; padding: 2px 8px; border-radius: 4px; background: #eeede9; color: #666; }
        .details-btn {
            margin-left: auto; font-size: .72rem; font-weight: 600; color: var(--text);
            background: var(--card); border: 1.5px solid var(--border); border-radius: 6px;
            padding: 5px 14px; cursor: pointer; transition: all .15s; font-family: inherit;
        }
        .details-btn:hover { border-color: #aaa; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
        .details-btn.open { background: var(--text); color: #fff; border-color: var(--text); }

        @media (max-width: 600px) {
            header { padding: 32px 0 16px; }
            header h1 { font-size: 1.3rem; }
            .mention-card { padding: 16px; }
            .card-top .date { margin-left: 0; width: 100%; margin-top: 4px; }
            .filters { gap: 6px; }
            .filter-btn { padding: 6px 14px; font-size: .78rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Bilibili Social Listening</h1>
        </header>

        <div class="overview" id="overview">Loading...</div>

        <div class="filters" id="filters"></div>

        <div class="date-bar">
            <label>Date:</label>
            <select id="dateSelect" onchange="loadMentions()">
                <option value="all">All 2026</option>
            </select>
        </div>

        <div class="updated" id="updated"></div>

        <div id="content">
            <div class="loading"><div class="spinner"></div>Loading mentions...</div>
        </div>
    </div>

    <script>
        const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? '' : 'https://duflat-production.up.railway.app';

        let allMentions = [];
        let currentFilter = 'all';

        async function loadMentions() {
            const dateVal = document.getElementById('dateSelect').value;
            const url = dateVal === 'all'
                ? `${API}/social/mentions?days=365`
                : `${API}/social/mentions?date=${dateVal}`;

            document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Loading mentions...</div>';

            try {
                const resp = await fetch(url);
                const data = await resp.json();

                allMentions = data.mentions || [];
                const stats = data.stats || {};
                const dates = data.available_dates || [];

                // Overview
                document.getElementById('overview').innerHTML =
                    `<strong>${stats.total || 0}</strong> mentions` +
                    `<span class="sep">|</span><span class="pos">${stats.positive || 0}</span> positive` +
                    `<span class="sep">|</span><span class="neg">${stats.negative || 0}</span> negative` +
                    `<span class="sep">|</span><span class="neu">${stats.neutral || 0}</span> neutral`;

                // Filters
                const pos = allMentions.filter(m => m.sentiment === 'positive').length;
                const neg = allMentions.filter(m => m.sentiment === 'negative').length;
                const neu = allMentions.filter(m => m.sentiment === 'neutral').length;
                document.getElementById('filters').innerHTML =
                    `<button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all',this)">All <span class="count">(${allMentions.length})</span></button>` +
                    `<button class="filter-btn ${currentFilter==='positive'?'active':''}" onclick="setFilter('positive',this)">Positive <span class="count">(${pos})</span></button>` +
                    `<button class="filter-btn ${currentFilter==='negative'?'active':''}" onclick="setFilter('negative',this)">Negative <span class="count">(${neg})</span></button>` +
                    `<button class="filter-btn ${currentFilter==='neutral'?'active':''}" onclick="setFilter('neutral',this)">Neutral <span class="count">(${neu})</span></button>`;

                // Date selector
                const select = document.getElementById('dateSelect');
                const currentVal = select.value;
                select.innerHTML = '<option value="all">All 2026</option>';
                dates.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d;
                    opt.textContent = formatDate(d);
                    select.appendChild(opt);
                });
                select.value = currentVal;

                // Updated time
                document.getElementById('updated').textContent = `Last updated: ${new Date().toLocaleDateString('en-US', {month:'long',day:'numeric',year:'numeric'})}`;

                renderMentions();
            } catch (e) {
                document.getElementById('content').innerHTML = `<div class="empty">Failed to load. <a href="#" onclick="loadMentions();return false">Retry</a></div>`;
            }
        }

        function setFilter(sentiment, btn) {
            currentFilter = sentiment;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderMentions();
        }

        function renderMentions() {
            const filtered = currentFilter === 'all' ? allMentions : allMentions.filter(m => m.sentiment === currentFilter);

            if (filtered.length === 0) {
                document.getElementById('content').innerHTML = '<div class="empty">No mentions found.</div>';
                return;
            }

            const html = '<div class="mentions">' + filtered.map((m, i) => {
                const s = m.sentiment || 'neutral';
                const keywords = (m.keywords || []).map(k => `<span class="tag">${k}</span>`).join('');
                const hasOriginal = m.content_original && m.content_original !== m.content_english;
                const detailsHtml = hasOriginal
                    ? `<div class="card-details" id="details-${i}"><div class="original-label">Original (${m.language || 'Unknown'})</div>${escapeHtml(m.content_original)}</div>`
                    : '';
                const detailsBtn = hasOriginal
                    ? `<button class="details-btn" onclick="toggleDetails('details-${i}',this)">Details</button>`
                    : '';

                return `<div class="mention-card ${s}" data-sentiment="${s}">
                    <div class="card-top">
                        <span class="sentiment-dot"></span>
                        <span class="sentiment-label">${s}</span>
                        <a class="platform-link" href="${escapeHtml(m.url)}" target="_blank" rel="noopener">${escapeHtml(m.platform)}</a>
                        <span class="lang-badge">${escapeHtml(m.language || 'Unknown')}</span>
                        <span class="date">${formatDate(m.content_date)}</span>
                    </div>
                    <div class="card-author">${escapeHtml(m.author || 'Unknown')}</div>
                    <div class="card-quote">${escapeHtml(m.content_english || m.content_original)}</div>
                    ${detailsHtml}
                    <div class="card-bottom">
                        ${keywords}
                        ${detailsBtn}
                    </div>
                </div>`;
            }).join('') + '</div>';

            document.getElementById('content').innerHTML = html;
        }

        function toggleDetails(id, btn) {
            const panel = document.getElementById(id);
            if (!panel) return;
            const isOpen = panel.classList.toggle('open');
            btn.classList.toggle('open', isOpen);
            btn.textContent = isOpen ? 'Close' : 'Details';
        }

        function formatDate(d) {
            if (!d) return '';
            const dt = new Date(d + 'T00:00:00');
            return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // Load on page load
        loadMentions();
    </script>
</body>
</html>
