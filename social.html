<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duflat — Social</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #faf9f7;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .welcome {
            text-align: center;
            padding: 40px 24px;
        }
        .welcome h1 {
            font-family: 'Merriweather', serif;
            font-size: 2.4rem;
            font-weight: 900;
            margin-bottom: 12px;
        }
        .welcome p {
            font-size: 1.05rem;
            color: #555;
            max-width: 420px;
            margin: 0 auto;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="welcome">
        <h1>Welcome to Duflat</h1>
        <p>Something new is coming. Stay tuned.</p>
    </div>
</body>
</html>
