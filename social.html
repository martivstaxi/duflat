<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duflat — Social Listening</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    /* Warm refined palette — sand, cream, terracotta */
    --bg: #f6f3ec;
    --bg-elevated: #ffffff;
    --card: #ffffff;
    --border: #d8d2c3;
    --border-subtle: #e8e3d4;
    --hairline: #efeadd;

    --text: #2b2620;
    --text-secondary: #524b41;
    --muted: #7a7167;
    --tertiary: #9d9387;

    --positive: #3d8a5e;
    --negative: #b54a35;
    --neutral:  #b08322;

    --accent: #b85d3a;
    --accent-hover: #a45131;
    --accent-soft: rgba(184,93,58,.10);
    --accent-tint: #f3e6dc;

    --shadow-sm: 0 1px 2px rgba(63,47,30,.04);
    --shadow-md: 0 4px 14px rgba(63,47,30,.06), 0 1px 3px rgba(63,47,30,.04);
    --shadow-lg: 0 14px 40px rgba(63,47,30,.12), 0 2px 6px rgba(63,47,30,.05);

    --ease: cubic-bezier(.4,0,.2,1);
    --ease-out: cubic-bezier(.16,1,.3,1);

    --font-system: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text",
                    "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

html, body { background: var(--bg); }
body {
    font-family: var(--font-system);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
    text-rendering: optimizeLegibility;
}
html[lang^="zh"] body { font-family: "Noto Sans SC", var(--font-system); }

.container { max-width: 820px; margin: 0 auto; padding: 0 24px; }

header { padding: 88px 0 28px; text-align: center; }
header h1 {
    font-family: var(--font-system);
    font-size: 2.6rem;
    font-weight: 700;
    letter-spacing: -.025em;
    line-height: 1.08;
    color: var(--text);
}
html[lang^="zh"] header h1 { font-family: "Noto Sans SC", var(--font-system); letter-spacing: -.01em; }

.lang-toggle {
    position: fixed; top: 18px; right: 18px; z-index: 200;
    display: inline-flex; gap: 1px;
    background: rgba(255,255,255,.72);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border: 1px solid rgba(0,0,0,.06);
    border-radius: 980px; padding: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,.04);
}
.lang-btn {
    padding: 6px 14px; border-radius: 980px; border: none;
    background: transparent;
    font-family: inherit; font-size: .72rem; font-weight: 600;
    color: var(--muted); cursor: pointer;
    transition: color .2s var(--ease), background .2s var(--ease);
    line-height: 1; min-width: 38px;
}
.lang-btn:hover { color: var(--text); }
.lang-btn.active { background: var(--accent); color: #fff; }

@media (max-width: 600px) {
    .lang-toggle { top: 12px; right: 12px; padding: 3px; }
    .lang-btn { padding: 5px 11px; font-size: .68rem; min-width: 34px; }
}

.sentiment-btns {
    display: flex; gap: 6px; justify-content: center;
    padding: 10px 0 36px; flex-wrap: wrap;
}
.sent-btn {
    padding: 8px 16px; border-radius: 980px;
    border: 1px solid var(--border-subtle);
    background: var(--card);
    font-family: inherit; font-size: .78rem; font-weight: 500;
    color: var(--text-secondary); cursor: pointer;
    transition: all .2s var(--ease); user-select: none;
    display: flex; align-items: center; gap: 7px;
    box-shadow: var(--shadow-sm);
}
.sent-btn:hover {
    border-color: var(--border); color: var(--text);
    transform: translateY(-1px); box-shadow: var(--shadow-md);
}
.sent-btn .dot { width: 7px; height: 7px; border-radius: 50%; }
.sent-btn .count { font-size: .68rem; font-weight: 500; opacity: .6; font-variant-numeric: tabular-nums; }

.sent-btn.active.pos { background: var(--positive); color: #fff; border-color: var(--positive); }
.sent-btn.active.neg { background: var(--negative); color: #fff; border-color: var(--negative); }
.sent-btn.active.neu { background: var(--neutral); color: #fff; border-color: var(--neutral); }
.sent-btn.active.pos .dot,
.sent-btn.active.neg .dot,
.sent-btn.active.neu .dot { background: #fff; }
.sent-btn.active.all-btn {
    background: var(--accent); border-color: var(--accent); color: #fff;
}
.sent-btn.all-btn svg { width: 14px; height: 14px; stroke: var(--muted); }
.sent-btn.active.all-btn svg { stroke: #fff; }

.filter-toggle {
    display: flex; align-items: center; justify-content: center;
    padding: 8px 12px; border-radius: 980px;
    border: 1px solid var(--border-subtle);
    background: var(--card);
    font-family: inherit; font-size: .78rem; font-weight: 500;
    color: var(--text-secondary); cursor: pointer;
    transition: all .2s var(--ease); position: relative;
    box-shadow: var(--shadow-sm);
}
.filter-toggle:hover {
    border-color: var(--border); color: var(--text);
    transform: translateY(-1px); box-shadow: var(--shadow-md);
}
.filter-toggle.has-filter {
    border-color: var(--accent); color: var(--accent); background: var(--card);
}
.filter-toggle svg { width: 14px; height: 14px; }
.filter-badge {
    position: absolute; top: -4px; right: -4px;
    width: 17px; height: 17px; border-radius: 50%;
    background: var(--accent); color: #fff;
    font-size: .58rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 3px rgba(0,0,0,.15); font-variant-numeric: tabular-nums;
}

.active-chips {
    display: flex; gap: 6px; flex-wrap: wrap;
    margin-bottom: 22px; justify-content: center;
}
.active-chips:empty { display: none; }
.chip {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 10px 5px 12px; border-radius: 980px;
    font-size: .72rem; font-weight: 500;
    background: var(--hairline); color: var(--text-secondary);
    border: 1px solid transparent;
    transition: background .15s var(--ease);
    min-width: 60px; justify-content: space-between;
    cursor: pointer; user-select: none;
}
.chip:hover { background: var(--border-subtle); }
.chip:hover .chip-remove { background: var(--negative); color: #fff; }
.chip-remove {
    width: 16px; height: 16px; background: rgba(0,0,0,.08);
    border-radius: 50%; color: var(--muted);
    font-size: .7rem; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s var(--ease);
    pointer-events: none;
}

#filterDropdownAnchor { position: relative; }
#filterDropdownAnchor .filter-dropdown {
    display: none; position: absolute; top: 0; right: 0;
    background: var(--card);
    border: 1px solid var(--border-subtle); border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 18px; z-index: 100; min-width: 280px;
}
#filterDropdownAnchor.open .filter-dropdown {
    display: block;
    animation: dropdownIn .25s var(--ease-out);
}
@keyframes dropdownIn {
    from { opacity: 0; transform: translateY(-6px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

.filter-section { margin-bottom: 16px; }
.filter-section:last-child { margin-bottom: 0; }
.filter-section-title {
    font-size: .65rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; color: var(--tertiary); margin-bottom: 10px;
}
.filter-options { display: flex; flex-direction: column; gap: 2px; }
.filter-option {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 11px; border-radius: 8px; border: none;
    background: none;
    font-family: inherit; font-size: .82rem; font-weight: 400;
    color: var(--text); cursor: pointer;
    transition: background .15s var(--ease);
    text-align: left; width: 100%;
}
.filter-option:hover { background: var(--hairline); }
.filter-option.active { background: var(--accent-tint); color: var(--accent); font-weight: 600; }
.filter-option .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.filter-option .opt-count {
    margin-left: auto; font-size: .7rem; color: var(--tertiary);
    font-weight: 500; font-variant-numeric: tabular-nums;
}
.filter-option.active .opt-count { color: var(--accent); opacity: .65; }
.filter-option.disabled { opacity: .3; pointer-events: none; }

.cal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 0 10px;
}
.cal-header .cal-title { font-size: .82rem; font-weight: 600; color: var(--text); }
.cal-header button {
    background: none; border: none; cursor: pointer;
    padding: 4px 8px; font-size: .9rem; color: var(--muted);
    border-radius: 6px; transition: all .15s var(--ease);
}
.cal-header button:hover { background: var(--hairline); color: var(--text); }

.cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; text-align: center; }
.cal-grid .cal-day-name {
    font-size: .58rem; font-weight: 600; color: var(--tertiary);
    padding: 2px 0 8px; text-transform: uppercase; letter-spacing: .06em;
}
.cal-grid .cal-day {
    padding: 7px 2px; border-radius: 8px; border: none; background: none;
    font-family: inherit; font-size: .76rem; font-weight: 400;
    color: var(--text); cursor: pointer;
    transition: all .15s var(--ease); font-variant-numeric: tabular-nums;
}
.cal-grid .cal-day:hover { background: var(--hairline); }
.cal-grid .cal-day.active { background: var(--accent); color: #fff; font-weight: 600; }
.cal-grid .cal-day.disabled { opacity: .25; pointer-events: none; }
.cal-grid .cal-day.has-content { font-weight: 600; }

.loading { text-align: center; padding: 80px 0; color: var(--muted); font-size: .88rem; }
.loading .spinner {
    width: 22px; height: 22px;
    border: 2.5px solid var(--border-subtle);
    border-top-color: var(--accent);
    border-radius: 50%; animation: spin .7s linear infinite;
    margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 80px 0; color: var(--muted); font-size: .88rem; }

.date-divider { display: flex; align-items: center; gap: 18px; margin: 36px 0 20px; }
.date-divider:first-child { margin-top: 0; }
.date-divider .line { flex: 1; height: 1px; background: var(--border-subtle); }
.date-divider .label {
    font-size: .68rem; font-weight: 600; color: var(--tertiary);
    white-space: nowrap; letter-spacing: .08em; text-transform: uppercase;
    font-variant-numeric: tabular-nums;
}

.mentions { display: flex; flex-direction: column; gap: 12px; padding: 0 0 16px 38px; }
.mention-card {
    background: var(--card);
    border: 1px solid var(--border-subtle);
    border-radius: 18px;
    padding: 22px 24px; position: relative;
    transition: transform .2s var(--ease), box-shadow .25s var(--ease), border-color .2s var(--ease);
    box-shadow: var(--shadow-sm);
}
.mention-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--border);
}

.priority-marker {
    position: absolute; left: -32px; top: 22px;
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    border-radius: 50%;
    font-family: inherit; font-size: .48rem; font-weight: 700;
    letter-spacing: .02em; line-height: 1;
    user-select: none; flex-shrink: 0;
    transition: transform .2s var(--ease);
}
.priority-marker.p0 {
    background: var(--negative); color: #fff;
    box-shadow: 0 1px 3px rgba(181,74,53,.22);
}
.priority-marker.p1 {
    background: #d18a2c; color: #fff;
    box-shadow: 0 1px 3px rgba(209,138,44,.22);
}
.priority-marker.p2 {
    background: transparent; color: var(--tertiary);
    border: 1px solid var(--border);
}
.mention-card:hover .priority-marker { transform: scale(1.08); }

.card-top {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px; flex-wrap: wrap;
}
.card-tag {
    font-size: .68rem; font-weight: 500; color: var(--tertiary);
    margin-left: auto; font-variant-numeric: tabular-nums;
}
.sentiment-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.positive .sentiment-dot { background: var(--positive); }
.negative .sentiment-dot { background: var(--negative); }
.neutral  .sentiment-dot { background: var(--neutral); }

.sensitivity-badge {
    font-size: .6rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .06em; padding: 3px 8px; border-radius: 5px; line-height: 1;
}
.sensitivity-critical { background: var(--negative); color: #fff; }
.sensitivity-high     { background: #d18a2c; color: #fff; }
.sensitivity-medium   { background: var(--muted); color: #fff; }
.sensitivity-critical-card { border-left: 3px solid var(--negative); }
.sensitivity-high-card     { border-left: 3px solid #d18a2c; }

.source-tag {
    font-size: .6rem; font-weight: 600; padding: 3px 7px; border-radius: 5px;
    color: var(--text-secondary); background: var(--hairline); line-height: 1;
}
.source-government { background: #f7e6e1; color: #8a3826; }
.source-news_major { background: #ece8de; color: #4a4034; }
.source-financial  { background: #e6efe5; color: #2d5a3f; }

.card-meta { font-size: .74rem; color: var(--tertiary); }
.card-meta a {
    text-decoration: none; font-weight: 500;
    transition: opacity .15s, background .15s;
    display: inline-block; min-width: 48px;
    padding: 3px 8px; margin: -3px -2px;
    text-align: left; border-radius: 7px;
}
.card-meta a:hover { opacity: 1; background: var(--hairline); text-decoration: none; }
.positive .card-meta a { color: var(--positive); }
.negative .card-meta a { color: var(--negative); }
.neutral  .card-meta a { color: var(--neutral); }
.card-meta .sep { margin: 0 6px; opacity: .35; }

.card-quote {
    font-size: .94rem; line-height: 1.6;
    color: var(--text); margin-bottom: 14px;
    letter-spacing: -.005em;
}

.card-details {
    display: none; margin-bottom: 14px; padding: 16px 18px;
    background: var(--bg); border: 1px solid var(--border-subtle);
    border-radius: 12px;
    font-size: .88rem; line-height: 1.65; color: var(--text-secondary);
}
.card-details.open { display: block; animation: fadeIn .2s var(--ease-out); }
.card-details .original-label {
    font-size: .62rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .08em; color: var(--tertiary); margin-bottom: 8px;
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(-3px); }
    to   { opacity: 1; transform: translateY(0); }
}

.details-btn {
    font-size: .68rem; font-weight: 500; color: var(--text-secondary);
    background: var(--card); border: 1px solid var(--border-subtle);
    border-radius: 980px; padding: 5px 12px; cursor: pointer;
    transition: all .15s var(--ease); font-family: inherit;
}
.details-btn:hover { border-color: var(--border); color: var(--text); box-shadow: var(--shadow-sm); }
.details-btn.open { background: var(--accent); color: #fff; border-color: var(--accent); }

.archive-section {
    margin-top: 64px; padding: 40px 0 72px;
    border-top: 1px solid var(--border-subtle); text-align: center;
}
.archive-section h2 {
    font-size: .68rem; font-weight: 600; color: var(--tertiary);
    text-transform: uppercase; letter-spacing: .12em; margin-bottom: 22px;
}
.archive-dates { display: flex; gap: 8px; justify-content: center; align-items: center; }
.archive-date-btn {
    padding: 10px 18px; border-radius: 12px;
    border: 1px solid var(--border-subtle);
    background: var(--card);
    font-family: inherit; font-size: .78rem; font-weight: 500;
    color: var(--text); cursor: pointer;
    transition: all .2s var(--ease); min-width: 64px;
    box-shadow: var(--shadow-sm);
}
.archive-date-btn:hover {
    border-color: var(--border); transform: translateY(-2px);
    box-shadow: var(--shadow-md);
}
.archive-date-btn.active {
    background: var(--accent); color: #fff; border-color: var(--accent);
}
.archive-date-btn .day {
    font-weight: 600; font-size: .9rem; display: block;
    font-variant-numeric: tabular-nums;
}
.archive-date-btn .month {
    font-size: .64rem; color: inherit; opacity: .6;
    text-transform: uppercase; letter-spacing: .06em; margin-top: 2px;
}
.archive-nav {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1px solid var(--border-subtle);
    background: var(--card); cursor: pointer;
    transition: all .2s var(--ease);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; box-shadow: var(--shadow-sm);
}
.archive-nav:hover {
    border-color: var(--border); background: var(--card);
    transform: translateY(-2px); box-shadow: var(--shadow-md);
}
.archive-nav svg { width: 14px; height: 14px; stroke: var(--text-secondary); transition: stroke .15s; }
.archive-nav:hover svg { stroke: var(--text); }
.archive-nav.disabled { opacity: .35; pointer-events: none; }

@media (max-width: 600px) {
    .container { padding: 0 16px; }

    header { padding: 56px 0 18px; }
    header h1 { font-size: 1.85rem; letter-spacing: -.02em; }

    .sentiment-btns { flex-wrap: wrap; gap: 5px; padding: 8px 0 24px; }
    .sent-btn { padding: 7px 13px; font-size: .72rem; }
    .sent-btn .count { font-size: .62rem; }
    .filter-toggle { padding: 7px 11px; font-size: .72rem; }

    #filterDropdownAnchor .filter-dropdown {
        right: auto; left: 0; min-width: unset; width: 100%;
        padding: 16px; max-height: 60vh; overflow-y: auto;
    }

    .mentions { padding: 0 0 16px 30px; gap: 10px; }
    .priority-marker {
        left: -26px; top: 16px;
        width: 20px; height: 20px;
        font-size: .46rem;
    }
    .mention-card { padding: 16px 18px; border-radius: 16px; }
    .card-quote { font-size: .88rem; line-height: 1.55; }
    .card-meta { font-size: .7rem; }
    .card-details { padding: 12px 14px; font-size: .82rem; }
    .details-btn { font-size: .64rem; padding: 4px 10px; }

    .date-divider { gap: 12px; margin: 24px 0 16px; }
    .date-divider .label { font-size: .62rem; }

    .archive-section { margin-top: 40px; padding: 28px 0 56px; }
    .archive-section h2 { font-size: .62rem; margin-bottom: 16px; letter-spacing: .1em; }
    .archive-dates { gap: 6px; }
    .archive-date-btn { padding: 8px 12px; min-width: 52px; font-size: .72rem; }
    .archive-date-btn .day { font-size: .82rem; }
    .archive-date-btn .month { font-size: .58rem; }
    .archive-nav { width: 34px; height: 34px; }
    .archive-nav svg { width: 12px; height: 12px; }

    .active-chips { gap: 5px; margin-bottom: 16px; }
    .chip { font-size: .68rem; padding: 4px 9px 4px 11px; }
}
    </style>
</head>
<body>
    <div class="lang-toggle" id="langToggle"></div>

    <div class="container">
        <header>
            <h1 id="siteTitle">Social Listening</h1>
        </header>

        <div class="sentiment-btns" id="sentimentBtns"></div>
        <div id="filterDropdownAnchor"></div>

        <div class="active-chips" id="activeChips"></div>

        <div id="content">
            <div class="loading" id="loadingBlock"><div class="spinner"></div><span id="loadingText">Loading mentions...</span></div>
        </div>

        <div class="archive-section" id="archiveSection" style="display:none">
            <h2 id="archiveTitle">Browse by date</h2>
            <div class="archive-dates" id="archiveDates"></div>
        </div>
    </div>

    <script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? '' : 'https://duflat-production.up.railway.app';

if (API) fetch(API + '/ping').catch(() => {});

let allMentions = [];
let allDates = [];
let currentFilter = 'all';
let currentLang = 'all';
let currentDateFilter = null;
let filterOpen = false;
let archivePage = 0;
const DATES_PER_PAGE = 4;
let filterMonth = null;
let currentSensitivity = 'all';
let currentPlatform = 'all';
let showMonths = false;

const CACHE_KEY = 'social_mentions_cache';
const CACHE_TTL = 5 * 60 * 1000;

const I18N = {
    en: {
        title: 'Social Listening',
        loading: 'Loading mentions...',
        failedLoad: 'Failed to load.',
        retry: 'Retry',
        noMentions: 'No mentions found.',
        tryClearing: ' Try clearing filters.',
        browseByDate: 'Browse by date',
        all: 'All',
        positive: 'Positive',
        negative: 'Negative',
        neutral: 'Neutral',
        filterLanguage: 'Language',
        filterPriority: 'Priority',
        filterDate: 'Date',
        filterPlatform: 'Platform',
        filterMonth: 'Month',
        platformOthers: 'Others',
        unknownDate: 'Unknown date',
        unknownLang: 'Unknown',
        close: 'Close',
        original: 'Original',
        olderTitle: 'Older',
        newerTitle: 'Newer',
        allDatesTop: 'All',
        allDatesBottom: 'dates',
        months: ['January','February','March','April','May','June','July','August','September','October','November','December'],
        dayShort: ['S','M','T','W','T','F','S'],
        langs: {},
        dateLocale: 'en-US',
    },
    zh: {
        title: '社交聆听',
        loading: '正在加载内容...',
        failedLoad: '加载失败。',
        retry: '重试',
        noMentions: '未找到内容。',
        tryClearing: '请尝试清除筛选条件。',
        browseByDate: '按日期浏览',
        all: '全部',
        positive: '正面',
        negative: '负面',
        neutral: '中性',
        filterLanguage: '语言',
        filterPriority: '优先级',
        filterDate: '日期',
        filterPlatform: '平台',
        filterMonth: '月份',
        platformOthers: '其他',
        unknownDate: '未知日期',
        unknownLang: '未知',
        close: '关闭',
        original: '原文',
        olderTitle: '较新',
        newerTitle: '较旧',
        allDatesTop: '全部',
        allDatesBottom: '日期',
        months: ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'],
        dayShort: ['日','一','二','三','四','五','六'],
        langs: {
            English: '英语', Japanese: '日语', Arabic: '阿拉伯语',
            'Traditional Chinese': '繁体中文', 'Simplified Chinese': '简体中文',
            Chinese: '中文', Turkish: '土耳其语', Russian: '俄语',
            Spanish: '西班牙语', Portuguese: '葡萄牙语', Korean: '韩语',
            French: '法语', German: '德语', Italian: '意大利语',
            Hindi: '印地语', Thai: '泰语', Vietnamese: '越南语',
            Indonesian: '印尼语', Dutch: '荷兰语', Polish: '波兰语',
            Unknown: '未知',
        },
        dateLocale: 'zh-CN',
    },
};

function detectInitialLang() {
    try {
        const saved = localStorage.getItem('ui_lang');
        if (saved === 'zh' || saved === 'en') return saved;
    } catch (e) {}
    const nav = ((navigator.language || navigator.userLanguage || 'en') + '').toLowerCase();
    return nav.startsWith('zh') ? 'zh' : 'en';
}

let uiLang = detectInitialLang();
document.documentElement.lang = (uiLang === 'zh' ? 'zh-CN' : 'en');

function T(k) {
    const v = I18N[uiLang] && I18N[uiLang][k];
    if (v !== undefined) return v;
    return (I18N.en[k] !== undefined ? I18N.en[k] : k);
}

function TL(lang) {
    if (!lang || lang === 'Unknown') return T('unknownLang');
    if (uiLang === 'zh') {
        return I18N.zh.langs[lang] || lang;
    }
    return lang;
}

function setUILang(l) {
    if (l !== 'en' && l !== 'zh') return;
    uiLang = l;
    try { localStorage.setItem('ui_lang', l); } catch (e) {}
    document.documentElement.lang = (l === 'zh' ? 'zh-CN' : 'en');
    document.title = 'Duflat — ' + T('title');
    const titleEl = document.getElementById('siteTitle');
    if (titleEl) titleEl.textContent = T('title');
    const archTitle = document.getElementById('archiveTitle');
    if (archTitle) archTitle.textContent = T('browseByDate');
    renderLangToggle();
    renderAll();
}

function renderLangToggle() {
    const el = document.getElementById('langToggle');
    if (!el) return;
    el.innerHTML =
        `<button class="lang-btn ${uiLang==='en'?'active':''}" onclick="setUILang('en')">EN</button>` +
        `<button class="lang-btn ${uiLang==='zh'?'active':''}" onclick="setUILang('zh')">中文</button>`;
}

function _applyData(data) {
    const today = new Date().toISOString().slice(0, 10);
    const mentions = (data.mentions || []).filter(m => !m.content_date || m.content_date <= today);
    mentions.sort((a, b) => (b.content_date || '').localeCompare(a.content_date || ''));
    allMentions = mentions;
    const raw = (data.available_dates || []).filter(d => d <= today);
    allDates = raw.sort((a, b) => b.localeCompare(a));
    renderAll();
}

async function loadMentions() {
    try {
        const cached = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
        if (cached && cached.data && (Date.now() - cached.ts) < CACHE_TTL) {
            _applyData(cached.data);
        } else if (cached && cached.data) {
            _applyData(cached.data);
        } else {
            document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div>${escapeHtml(T('loading'))}</div>`;
        }
    } catch (e) {
        document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div>${escapeHtml(T('loading'))}</div>`;
    }

    try {
        const resp = await fetch(`${API}/social/mentions?days=365&limit=5000`);
        const data = await resp.json();
        if (data && data.cap_hit) {
            console.warn(`[social] result capped at ${data.limit} — older entries hidden; raise the limit on /social/mentions?limit=`);
        }
        localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), data }));
        _applyData(data);
    } catch (e) {
        if (!allMentions.length) {
            document.getElementById('content').innerHTML = `<div class="empty">${escapeHtml(T('failedLoad'))} <a href="#" onclick="loadMentions();return false">${escapeHtml(T('retry'))}</a></div>`;
        }
    }
}

function renderAll() {
    renderSentimentBtns();
    renderFilterDropdown();
    renderActiveChips();
    renderMentions();
    renderArchive();
    updateFilterToggle();
}

function renderSentimentBtns() {
    const base = currentDateFilter ? allMentions.filter(m => m.content_date === currentDateFilter) : allMentions;
    const filtered = currentLang !== 'all' ? base.filter(m => (m.language || 'Unknown') === currentLang) : base;
    const pos = filtered.filter(m => m.sentiment === 'positive').length;
    const neg = filtered.filter(m => m.sentiment === 'negative').length;
    const neu = filtered.filter(m => m.sentiment === 'neutral').length;

    document.getElementById('sentimentBtns').innerHTML =
        `<button class="sent-btn all-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">${escapeHtml(T('all'))} <span class="count">${filtered.length}</span></button>` +
        `<button class="sent-btn pos ${currentFilter==='positive'?'active':''}" onclick="setFilter('positive')">
            <span class="dot" style="background:var(--positive)"></span>${escapeHtml(T('positive'))} <span class="count">${pos}</span>
        </button>` +
        `<button class="sent-btn neg ${currentFilter==='negative'?'active':''}" onclick="setFilter('negative')">
            <span class="dot" style="background:var(--negative)"></span>${escapeHtml(T('negative'))} <span class="count">${neg}</span>
        </button>` +
        `<button class="sent-btn neu ${currentFilter==='neutral'?'active':''}" onclick="setFilter('neutral')">
            <span class="dot" style="background:var(--neutral)"></span>${escapeHtml(T('neutral'))} <span class="count">${neu}</span>
        </button>` +
        `<button class="filter-toggle" id="filterToggle" onclick="toggleFilterPanel(event)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
        </button>`;
}

function toggleFilterPanel(e) {
    if (e) e.stopPropagation();
    filterOpen = !filterOpen;
    const anchor = document.getElementById('filterDropdownAnchor');
    anchor.classList.toggle('open', filterOpen);
}

document.addEventListener('click', function(e) {
    if (!filterOpen) return;
    const anchor = document.getElementById('filterDropdownAnchor');
    const toggle = document.getElementById('filterToggle');
    if (anchor.contains(e.target) || (toggle && toggle.contains(e.target))) return;
    filterOpen = false;
    anchor.classList.remove('open');
});

function updateFilterToggle() {
    const btn = document.getElementById('filterToggle');
    const count = (currentLang !== 'all' ? 1 : 0) + (currentDateFilter ? 1 : 0) + (currentSensitivity !== 'all' ? 1 : 0) + (currentPlatform !== 'all' ? 1 : 0);
    btn.classList.toggle('has-filter', count > 0);
    const existing = btn.querySelector('.filter-badge');
    if (existing) existing.remove();
    if (count > 0) {
        const badge = document.createElement('span');
        badge.className = 'filter-badge';
        badge.textContent = count;
        btn.appendChild(badge);
    }
}

function renderFilterDropdown() {
    const base = currentDateFilter ? allMentions.filter(m => m.content_date === currentDateFilter) : allMentions;

    const langs = {};
    base.forEach(m => {
        const lang = m.language || 'Unknown';
        langs[lang] = (langs[lang] || 0) + 1;
    });
    const langKeys = Object.keys(langs).sort();

    let html = `<div class="filter-section">
        <div class="filter-section-title">${escapeHtml(T('filterLanguage'))}</div>
        <div class="filter-options">
            <button class="filter-option ${currentLang==='all'?'active':''}" onclick="setLang('all')">${escapeHtml(T('all'))}<span class="opt-count">${base.length}</span></button>`;
    langKeys.forEach(lang => {
        html += `<button class="filter-option ${currentLang===lang?'active':''}" onclick="setLang('${escapeHtml(lang)}')">${escapeHtml(TL(lang))}<span class="opt-count">${langs[lang]}</span></button>`;
    });
    html += `</div></div>`;

    const priorityCounts = { p0: 0, p1: 0, p2: 0 };
    base.forEach(m => {
        priorityCounts[sensToPriority(m.sensitivity)]++;
    });
    const priOrder = ['p0','p1','p2'];
    const priLabels = {p0:'P0',p1:'P1',p2:'P2'};
    html += `<div class="filter-section">
        <div class="filter-section-title">${escapeHtml(T('filterPriority'))}</div>
        <div class="filter-options">
            <button class="filter-option ${currentSensitivity==='all'?'active':''}" onclick="setSensitivity('all')">${escapeHtml(T('all'))}<span class="opt-count">${base.length}</span></button>`;
    priOrder.forEach(p => {
        if (priorityCounts[p]) {
            html += `<button class="filter-option ${currentSensitivity===p?'active':''}" onclick="setSensitivity('${p}')">${priLabels[p]}<span class="opt-count">${priorityCounts[p]}</span></button>`;
        }
    });
    html += `</div></div>`;

    const platformCounts = { x: 0, reddit: 0, bluesky: 0, youtube: 0, others: 0 };
    base.forEach(m => { platformCounts[platformBucket(m.platform)]++; });
    html += `<div class="filter-section">
        <div class="filter-section-title">${escapeHtml(T('filterPlatform'))}</div>
        <div class="filter-options">
            <button class="filter-option ${currentPlatform==='all'?'active':''}" onclick="setPlatform('all')">${escapeHtml(T('all'))}<span class="opt-count">${base.length}</span></button>`;
    PLATFORM_ORDER.forEach(p => {
        if (!platformCounts[p]) return;
        const lbl = p === 'others' ? T('platformOthers') : PLATFORM_LABELS[p];
        html += `<button class="filter-option ${currentPlatform===p?'active':''}" onclick="setPlatform('${p}')">${escapeHtml(lbl)}<span class="opt-count">${platformCounts[p]}</span></button>`;
    });
    html += `</div></div>`;

    const dateSet = new Set(allDates);
    const monthNames = I18N[uiLang].months;
    const dayShort = I18N[uiLang].dayShort;

    html += `<div class="filter-section">
        <div class="filter-section-title">${escapeHtml(T('filterDate'))}</div>
        <div class="filter-options">
            <button class="filter-option ${!currentDateFilter && filterMonth===null?'active':''}" onclick="filterSelectYear()">2026<span class="opt-count">${allMentions.length}</span></button>`;

    html += `<button class="filter-option${showMonths && filterMonth===null?' active':''}" onclick="toggleMonths(event)" style="padding-left:20px">${escapeHtml(T('filterMonth'))}</button>`;

    if (showMonths && filterMonth === null) {
        const monthCounts = {};
        allMentions.forEach(m => {
            if (!m.content_date) return;
            const mo = parseInt(m.content_date.slice(5, 7), 10) - 1;
            monthCounts[mo] = (monthCounts[mo] || 0) + 1;
        });
        const currentMonth = new Date().getMonth();
        for (let mo = 0; mo < 12; mo++) {
            const isFuture = mo > currentMonth;
            const cls = isFuture ? 'filter-option disabled' : 'filter-option';
            html += `<button class="${cls}" onclick="filterSelectMonth(event,${mo})" style="padding-left:36px">${escapeHtml(monthNames[mo])}</button>`;
        }
    } else if (filterMonth !== null) {
        const mo = filterMonth;
        const daysInMonth = new Date(2026, mo + 1, 0).getDate();
        const firstDay = new Date(2026, mo, 1).getDay();
        html += `</div>
        <div class="cal-header">
            <button onclick="filterCalPrev(event)">&#8249;</button>
            <span class="cal-title">${escapeHtml(monthNames[mo])} 2026</span>
            <button onclick="filterCalNext(event)">&#8250;</button>
        </div>
        <div class="cal-grid">`;
        dayShort.forEach(d => { html += `<div class="cal-day-name">${escapeHtml(d)}</div>`; });
        for (let i = 0; i < firstDay; i++) html += `<div></div>`;
        for (let d = 1; d <= daysInMonth; d++) {
            const dateStr = `2026-${String(mo + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            const hasContent = dateSet.has(dateStr);
            const isActive = currentDateFilter === dateStr;
            let cls = 'cal-day';
            if (!hasContent) cls += ' disabled';
            else cls += ' has-content';
            if (isActive) cls += ' active';
            html += `<button class="${cls}" onclick="filterPickDate('${dateStr}')">${d}</button>`;
        }
        html += `</div>`;
    }
    html += `</div>`;

    const anchor = document.getElementById('filterDropdownAnchor');
    let dropdown = anchor.querySelector('.filter-dropdown');
    if (!dropdown) {
        anchor.innerHTML = '<div class="filter-dropdown"></div>';
        dropdown = anchor.querySelector('.filter-dropdown');
    }
    dropdown.innerHTML = html;
    if (filterOpen) anchor.classList.add('open');
}

function renderActiveChips() {
    let html = '';
    if (currentLang !== 'all') {
        html += `<span class="chip" onclick="setLang('all')" role="button" tabindex="0">${escapeHtml(TL(currentLang))}<span class="chip-remove" aria-hidden="true">&times;</span></span>`;
    }
    if (currentDateFilter) {
        const dt = new Date(currentDateFilter + 'T00:00:00');
        const label = dt.toLocaleDateString(I18N[uiLang].dateLocale, { month: 'short', day: 'numeric' });
        html += `<span class="chip" onclick="selectDate(null)" role="button" tabindex="0">${escapeHtml(label)}<span class="chip-remove" aria-hidden="true">&times;</span></span>`;
    }
    if (currentSensitivity !== 'all') {
        const priLabels = {p0:'P0',p1:'P1',p2:'P2'};
        html += `<span class="chip" onclick="setSensitivity('all')" role="button" tabindex="0">${priLabels[currentSensitivity] || currentSensitivity}<span class="chip-remove" aria-hidden="true">&times;</span></span>`;
    }
    if (currentPlatform !== 'all') {
        html += `<span class="chip" onclick="setPlatform('all')" role="button" tabindex="0">${escapeHtml(platformLabel(currentPlatform))}<span class="chip-remove" aria-hidden="true">&times;</span></span>`;
    }
    document.getElementById('activeChips').innerHTML = html;
}

const PLATFORM_LABELS = { x: 'X', reddit: 'Reddit', bluesky: 'Bluesky', youtube: 'YouTube' };
const PLATFORM_ORDER = ['x', 'reddit', 'bluesky', 'youtube', 'others'];

function platformBucket(p) {
    const v = (p || '').toLowerCase().trim();
    if (v === 'x' || v === 'x.com' || v === 'twitter.com') return 'x';
    if (v === 'reddit.com' || v.startsWith('reddit')) return 'reddit';
    if (v === 'bsky.app' || v.startsWith('bsky') || v.startsWith('bluesky')) return 'bluesky';
    if (v === 'youtube.com' || v.startsWith('youtu')) return 'youtube';
    return 'others';
}

function platformLabel(bucket) {
    return PLATFORM_LABELS[bucket] || T('platformOthers');
}

function sensToPriority(s) {
    if (s === 'critical') return 'p0';
    if (s === 'high') return 'p1';
    return 'p2';
}

function getFilteredMentions() {
    let list = allMentions;
    if (currentDateFilter) list = list.filter(m => m.content_date === currentDateFilter);
    if (currentFilter !== 'all') list = list.filter(m => m.sentiment === currentFilter);
    if (currentLang !== 'all') list = list.filter(m => (m.language || 'Unknown') === currentLang);
    if (currentSensitivity !== 'all') list = list.filter(m => sensToPriority(m.sensitivity) === currentSensitivity);
    if (currentPlatform !== 'all') list = list.filter(m => platformBucket(m.platform) === currentPlatform);
    return list;
}

function renderMentions() {
    const el = document.getElementById('content');
    const filtered = getFilteredMentions();

    if (filtered.length === 0) {
        const hint = currentFilter !== 'all' || currentLang !== 'all' ? T('tryClearing') : '';
        el.innerHTML = `<div class="empty">${escapeHtml(T('noMentions'))}${escapeHtml(hint)}</div>`;
        return;
    }

    const items = currentDateFilter ? filtered : filtered.slice(0, 50);

    const grouped = {};
    items.forEach(m => {
        const d = m.content_date || 'Unknown';
        if (!grouped[d]) grouped[d] = [];
        grouped[d].push(m);
    });

    let html = '<div class="mentions">';
    const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

    dates.forEach(date => {
        html += `<div class="date-divider"><span class="line"></span><span class="label">${escapeHtml(formatDateLong(date))}</span><span class="line"></span></div>`;
        grouped[date].forEach((m, i) => {
            html += renderCard(m, `${date}-${i}`);
        });
    });

    html += '</div>';
    el.innerHTML = html;
}

function renderCard(m, uid) {
    const s = m.sentiment || 'neutral';
    const sensitivity = m.sensitivity || 'low';
    const rawLang = m.language || 'Unknown';
    const langDisplay = TL(rawLang);
    const closeLabel = T('close');

    const displayQuote = (uiLang === 'zh' && m.content_chinese)
        ? m.content_chinese
        : (m.content_english || m.content_original || '');

    const hasOriginal = m.content_original && m.content_original !== m.content_english;
    const detailsHtml = hasOriginal
        ? `<div class="card-details" id="det-${uid}"><div class="original-label">${escapeHtml(T('original'))} (${escapeHtml(langDisplay)})</div>${escapeHtml(m.content_original)}</div>`
        : '';
    const detailsBtn = hasOriginal
        ? `<button class="details-btn" onclick="toggleDetails('det-${uid}',this,'${escapeHtml(langDisplay)}','${escapeHtml(closeLabel)}')">${escapeHtml(langDisplay)}</button>`
        : '';

    const priorityMap = { critical: 'p0', high: 'p1', medium: 'p2', low: 'p2' };
    const priorityLabels = { critical: 'P0', high: 'P1', medium: 'P2', low: 'P2' };
    const priorityClass = priorityMap[sensitivity] || 'p2';
    const priorityLabel = priorityLabels[sensitivity] || 'P2';
    const priorityMarker = `<div class="priority-marker ${priorityClass}" title="${sensitivity || 'low'}">${priorityLabel}</div>`;

    return `<div class="mention-card ${s}">
        ${priorityMarker}
        <div class="card-top">
            <span class="sentiment-dot"></span>
            <span class="card-meta"><a href="${escapeHtml(m.url)}" target="_blank" rel="noopener">${escapeHtml(m.platform || '')}</a></span>
            <span style="flex:1"></span>
            ${detailsBtn}
        </div>
        <div class="card-quote">${escapeHtml(displayQuote)}</div>
        ${detailsHtml}
    </div>`;
}

function renderArchive() {
    if (allDates.length === 0) {
        document.getElementById('archiveSection').style.display = 'none';
        return;
    }
    document.getElementById('archiveSection').style.display = '';
    const archTitle = document.getElementById('archiveTitle');
    if (archTitle) archTitle.textContent = T('browseByDate');
    const container = document.getElementById('archiveDates');

    const start = archivePage * DATES_PER_PAGE;
    const end = Math.min(start + DATES_PER_PAGE, allDates.length);
    const pageDates = allDates.slice(start, end);
    const hasPrev = archivePage > 0;
    const hasNext = end < allDates.length;

    const prevSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`;
    const nextSvg = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"/></svg>`;

    let html = '';

    html += `<button class="archive-nav ${hasPrev ? '' : 'disabled'}" onclick="archivePrev()" title="${escapeHtml(T('newerTitle'))}">${prevSvg}</button>`;

    html += `<button class="archive-date-btn ${!currentDateFilter?'active':''}" onclick="selectDate(null)">
        <span class="day">${escapeHtml(T('allDatesTop'))}</span><span class="month">${escapeHtml(T('allDatesBottom'))}</span>
    </button>`;

    pageDates.forEach(d => {
        const dt = new Date(d + 'T00:00:00');
        const day = dt.getDate();
        const month = dt.toLocaleDateString(I18N[uiLang].dateLocale, { month: 'short' });
        html += `<button class="archive-date-btn ${currentDateFilter===d?'active':''}" onclick="selectDate('${d}')">
            <span class="day">${day}</span><span class="month">${escapeHtml(month)}</span>
        </button>`;
    });

    html += `<button class="archive-nav ${hasNext ? '' : 'disabled'}" onclick="archiveNext()" title="${escapeHtml(T('olderTitle'))}">${nextSvg}</button>`;

    container.innerHTML = html;
}

function archiveNext() {
    const totalPages = Math.ceil(allDates.length / DATES_PER_PAGE);
    if (archivePage < totalPages - 1) {
        const archive = document.getElementById('archiveSection');
        const y = archive.getBoundingClientRect().top;
        archivePage++;
        renderArchive();
        const drift = archive.getBoundingClientRect().top - y;
        if (Math.abs(drift) > 2) window.scrollBy(0, drift);
    }
}

function archivePrev() {
    if (archivePage > 0) {
        const archive = document.getElementById('archiveSection');
        const y = archive.getBoundingClientRect().top;
        archivePage--;
        renderArchive();
        const drift = archive.getBoundingClientRect().top - y;
        if (Math.abs(drift) > 2) window.scrollBy(0, drift);
    }
}

function selectDate(date) {
    const archive = document.getElementById('archiveSection');
    const archiveViewY = archive.getBoundingClientRect().top;

    currentDateFilter = date;
    currentFilter = 'all';
    currentLang = 'all';
    if (!date) { archivePage = 0; filterMonth = null; }
    else { filterMonth = parseInt(date.slice(5, 7), 10) - 1; }
    renderAll();

    const newArchiveY = archive.getBoundingClientRect().top;
    const drift = newArchiveY - archiveViewY;
    if (Math.abs(drift) > 2) {
        window.scrollBy(0, drift);
    }
}

function setFilter(sentiment) {
    currentFilter = sentiment;
    renderAll();
}

function setLang(lang) {
    currentLang = lang;
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    renderAll();
}

function setSensitivity(val) {
    currentSensitivity = val;
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    renderAll();
}

function setPlatform(val) {
    currentPlatform = val;
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    renderAll();
}

function filterSelectYear() {
    filterMonth = null;
    showMonths = false;
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    selectDate(null);
}

function toggleMonths(e) {
    if (e) e.stopPropagation();
    showMonths = !showMonths;
    filterMonth = null;
    renderFilterDropdown();
}

function filterSelectMonth(e, mo) {
    if (e) e.stopPropagation();
    filterMonth = mo;
    showMonths = false;
    renderFilterDropdown();
}

function filterBackToMonths() {
    filterMonth = null;
    showMonths = true;
    renderFilterDropdown();
}

function filterCalPrev(e) {
    if (e) e.stopPropagation();
    if (filterMonth > 0) { filterMonth--; renderFilterDropdown(); }
}

function filterCalNext(e) {
    if (e) e.stopPropagation();
    const currentMonth = new Date().getMonth();
    if (filterMonth < currentMonth) { filterMonth++; renderFilterDropdown(); }
}

function filterPickDate(dateStr) {
    filterOpen = false;
    document.getElementById('filterDropdownAnchor').classList.remove('open');
    selectDate(dateStr);
}

function toggleDetails(id, btn, label, closeLabel) {
    const panel = document.getElementById(id);
    if (!panel) return;
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.textContent = isOpen ? closeLabel : label;
}

function formatDateLong(d) {
    if (!d || d === 'Unknown') return T('unknownDate');
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString(I18N[uiLang].dateLocale, { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    return (str + '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.title = 'Duflat — ' + T('title');
const _titleEl = document.getElementById('siteTitle');
if (_titleEl) _titleEl.textContent = T('title');
const _loadingTxt = document.getElementById('loadingText');
if (_loadingTxt) _loadingTxt.textContent = T('loading');
const _archTitle = document.getElementById('archiveTitle');
if (_archTitle) _archTitle.textContent = T('browseByDate');

renderLangToggle();
loadMentions();
    </script>
