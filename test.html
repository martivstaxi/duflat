<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duflat — TEST</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@700;900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:       #262624;
            --surface:  #1E1E1C;
            --accent:   #C15F3C;
            --muted:    #B1ADA1;
            --border:   rgba(177,173,161,.10);
            --border-m: rgba(177,173,161,.18);
            --text:     #FFFFFF;
            --faint:    rgba(177,173,161,.38);

            --font-sans:  'Inter', system-ui, sans-serif;
            --font-serif: 'Merriweather', Georgia, serif;
            --font-mono:  'Roboto Mono', 'Courier New', monospace;

            --shadow-sm: 0 1px 2px rgba(0,0,0,.18);
            --shadow:    0 4px 24px rgba(0,0,0,.28);
            --radius:    16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: var(--font-sans);
            color: var(--text);
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ── Main ───────────────────────────────────────────── */
        main {
            max-width: 720px;
            margin: 0 auto;
            padding: 0 24px 100px;
        }

        /* ── Hero ───────────────────────────────────────────── */
        .hero {
            text-align: center;
            padding: 120px 0 56px;
        }

        .page-title {
            font-family: var(--font-sans);
            font-size: 2.4rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 14px;
            letter-spacing: -.6px;
            line-height: 1.15;
        }

        .page-sub {
            color: var(--muted);
            font-size: 1rem;
            line-height: 1.65;
            max-width: 480px;
            margin: 0 auto;
        }

        /* ── Search ─────────────────────────────────────────── */
        .search-wrap {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 40px;
            background: var(--surface);
            border: 1px solid var(--border-m);
            border-radius: 14px;
            padding: 6px 6px 6px 18px;
            box-shadow: var(--shadow);
            transition: border-color .25s;
        }

        .search-wrap:focus-within { border-color: var(--accent); }

        /* ── Autocomplete dropdown ─────────────────────────── */
        .suggest-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 4px);
            left: 0; right: 0;
            background: var(--surface);
            border: 1px solid var(--border-m);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            z-index: 100;
            max-height: 320px;
            overflow-y: auto;
        }
        .suggest-dropdown.open { display: block; }

        .suggest-item {
            padding: 10px 18px;
            font-size: 0.85rem;
            color: var(--muted);
            cursor: pointer;
            transition: background .15s, color .15s;
            border-bottom: 1px solid var(--border);
        }
        .suggest-item:last-child { border-bottom: none; }
        .suggest-item:hover, .suggest-item.active {
            background: rgba(193,95,60,.1);
            color: var(--text);
        }
        .suggest-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .suggest-item img {
            width: 28px; height: 28px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .suggest-item .suggest-name {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .suggest-item .suggest-subs {
            font-size: 0.72rem;
            color: var(--faint);
            flex-shrink: 0;
        }

        #urlInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 0;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--text);
            outline: none;
        }

        #urlInput::placeholder { color: var(--faint); }

        #searchBtn {
            background: var(--accent);
            border: none;
            border-radius: 10px;
            padding: 12px 22px;
            color: #fff;
            font-family: var(--font-mono);
            font-size: 0.82rem;
            font-weight: 400;
            cursor: pointer;
            letter-spacing: .3px;
            text-transform: lowercase;
            transition: background .2s, transform .1s;
            white-space: nowrap;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #searchBtn:hover  { background: #d4694a; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(193,95,60,.3); }
        #searchBtn:active { transform: translateY(0); box-shadow: none; }
        #searchBtn:disabled { opacity: .35; cursor: default; transform: none; box-shadow: none; }

        /* ── Status / Error ──────────────────────────────────── */
        #statusMsg {
            display: none;
            font-size: 0.85rem;
            color: #e07060;
            margin-bottom: 20px;
            padding: 14px 18px;
            background: rgba(193,95,60,.06);
            border: 1px solid rgba(193,95,60,.15);
            border-radius: 12px;
        }

        /* ── Find Email button ───────────────────────────────── */
        .find-email-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(193,95,60,.08);
            border: 1px solid rgba(193,95,60,.22);
            border-radius: 10px;
            padding: 8px 16px;
            font-size: 0.78rem;
            font-weight: 500;
            font-family: var(--font-sans);
            color: var(--accent);
            cursor: pointer;
            margin-left: 8px;
            transition: all .2s ease;
        }
        .find-email-btn:hover  { background: rgba(193,95,60,.14); border-color: rgba(193,95,60,.35); color: #d4694a; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(193,95,60,.15); }
        .find-email-btn:active { transform: translateY(0); box-shadow: none; }
        .find-email-btn:disabled { opacity: .4; cursor: default; transform: none; box-shadow: none; }

        .email-found-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 0.88rem;
            color: var(--text);
        }
        .email-confidence {
            font-size: 0.68rem;
            color: var(--faint);
            margin-left: 4px;
        }

        /* ── Loader ──────────────────────────────────────────── */
        #loader {
            display: none;
            text-align: center;
            padding: 64px 0;
            color: var(--muted);
            font-size: 0.88rem;
        }

        .spinner {
            width: 28px; height: 28px;
            border: 2px solid rgba(177,173,161,.12);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        .dots-anim::after { content: ''; animation: dots 1.5s steps(4,end) infinite; }
        @keyframes dots { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } }

        /* ── Fade-in animation for report rows ── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .report-row { animation: fadeInUp .4s ease both; }
        .report-tags { animation: fadeInUp .4s ease both; }
        .report-meta { animation: fadeInUp .4s ease both; }

        /* ── Result reveal animation ─────────────────────────── */
        @keyframes resultReveal {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #result.reveal { animation: resultReveal .5s ease both; }

        /* ── Cards ───────────────────────────────────────────── */
        #result { display: none; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: box-shadow .3s ease;
        }

        .section-label {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .8px;
            color: var(--faint);
            margin-bottom: 14px;
        }

        /* ── Channel card header ─────────────────────────────── */
        .card-header {
            padding: 28px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 18px;
        }

        .channel-avatar {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.35rem;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
        }

        .channel-name {
            font-family: var(--font-sans);
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }

        .channel-handle {
            font-family: var(--font-mono);
            color: var(--accent);
            font-size: 0.82rem;
        }

        .channel-url-link {
            font-family: var(--font-mono);
            color: var(--faint);
            font-size: 0.72rem;
            text-decoration: none;
            margin-top: 4px;
            display: block;
            transition: color .2s;
        }

        .channel-url-link:hover { color: var(--muted); }

        /* ── Stats row ───────────────────────────────────────── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 1px solid var(--border);
        }

        .stat-item {
            padding: 20px 12px;
            text-align: center;
            border-right: 1px solid var(--border);
        }

        .stat-item:last-child { border-right: none; }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 1rem;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 0.66rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        /* ── Info grid ───────────────────────────────────────── */
        .info-grid {
            padding: 24px 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .info-item { display: flex; flex-direction: column; gap: 4px; }

        .info-label {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
        }

        .info-value {
            font-family: var(--font-mono);
            font-size: 0.83rem;
            color: var(--text);
            word-break: break-word;
        }

        .info-value a { color: var(--accent); text-decoration: none; }
        .info-value a:hover { text-decoration: underline; }
        .info-value.empty { font-family: var(--font-sans); color: var(--faint); font-style: italic; }

        .info-full { grid-column: 1 / -1; }

        /* ── Metadata rows (Email / Location / Joined) ───────── */
        .meta-section {
            padding: 0 30px;
            border-bottom: 1px solid var(--border);
        }

        .meta-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 13px 0;
            border-bottom: 1px solid var(--border);
        }

        .meta-row:last-child { border-bottom: none; }

        .meta-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--muted);
            width: 68px;
            flex-shrink: 0;
        }

        .meta-value {
            font-family: var(--font-mono);
            font-size: 0.83rem;
            color: var(--text);
            word-break: break-word;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .meta-value a { color: var(--accent); text-decoration: none; }
        .meta-value a:hover { text-decoration: underline; }

        /* ── About section ───────────────────────────────────── */
        .about-section {
            padding: 22px 30px;
            border-bottom: 1px solid var(--border);
        }

        .about-section-header {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0;
            margin-bottom: 14px;
        }

        /* ── Description box ────────────────────────────────── */
        .description-box {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 0.83rem;
            color: var(--muted);
            line-height: 1.7;
        }

        /* ── AI Report button ────────────────────────────────── */
        .ai-report-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(193,95,60,.08);
            border: 1px solid rgba(193,95,60,.22);
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: var(--font-sans);
            color: var(--accent);
            cursor: pointer;
            transition: all .2s ease;
        }
        .ai-report-btn:hover  { background: rgba(193,95,60,.14); border-color: rgba(193,95,60,.35); color: #d4694a; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(193,95,60,.15); }
        .ai-report-btn:active { transform: translateY(0); box-shadow: none; }
        .ai-report-btn:disabled { opacity: .4; cursor: default; background: rgba(193,95,60,.05); transform: none; box-shadow: none; }

        /* ── Report button row ───────────────────────────────── */
        .report-btn-row {
            display: flex;
            align-items: center;
            gap: 0;
        }
        .btn-arrow {
            font-size: 1.2rem;
            color: var(--faint);
            margin: 0 10px;
            user-select: none;
        }

        /* ── Email Generator button ─────────────────────────── */
        .email-gen-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: rgba(193,95,60,.08);
            border: 1px solid rgba(193,95,60,.22);
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 0.82rem;
            font-weight: 500;
            font-family: var(--font-sans);
            color: var(--accent);
            cursor: pointer;
            transition: all .2s ease;
        }
        .email-gen-btn:hover  { background: rgba(193,95,60,.14); border-color: rgba(193,95,60,.35); color: #d4694a; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(193,95,60,.15); }
        .email-gen-btn:active { transform: translateY(0); box-shadow: none; }
        .email-gen-btn:disabled { opacity: .4; cursor: default; background: rgba(193,95,60,.05); transform: none; box-shadow: none; }

        /* ── Email Preview ──────────────────────────────────── */
        .email-preview {
            margin-top: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        .email-preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
        }
        .email-copy-btn {
            background: rgba(193,95,60,.08);
            border: 1px solid rgba(193,95,60,.22);
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 0.72rem;
            font-weight: 500;
            font-family: var(--font-sans);
            color: var(--accent);
            cursor: pointer;
            transition: all .2s ease;
        }
        .email-copy-btn:hover { background: rgba(193,95,60,.14); border-color: rgba(193,95,60,.35); }
        .email-subject {
            padding: 12px 16px;
            font-size: 0.85rem;
            color: var(--text);
            border-bottom: 1px solid var(--border);
        }
        .email-body {
            padding: 14px 16px;
            font-size: 0.83rem;
            color: var(--muted);
            line-height: 1.7;
        }
        .tw-cursor {
            display: inline;
            color: var(--accent);
            font-weight: 400;
            animation: tw-blink .6s step-end infinite;
        }
        @keyframes tw-blink { 0%,100%{opacity:1} 50%{opacity:0} }

        .description-loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--faint);
            font-size: 0.8rem;
            font-style: italic;
        }

        .topic-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 10px;
        }

        .topic-tag {
            background: rgba(177,173,161,.06);
            border: 1px solid var(--border-m);
            border-radius: 6px;
            padding: 3px 10px;
            font-size: 0.72rem;
            color: var(--muted);
            font-family: var(--font-sans);
        }

        /* ── Social badges ──────────────────────────────────── */
        .social-grid {
            padding: 18px 30px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .social-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(177,173,161,.04);
            border: 1px solid var(--border-m);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            color: var(--muted);
            text-decoration: none;
            transition: all .2s ease;
        }

        .social-badge:hover { border-color: var(--accent); color: var(--text); background: rgba(193,95,60,.06); transform: translateY(-1px); }

        /* ── External links ────────────────────────────────── */
        .all-links-section { padding: 18px 30px 24px; }

        .all-links-title {
            font-size: 0.68rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-bottom: 10px;
        }

        .link-list { display: flex; flex-direction: column; gap: 6px; }

        .link-list a {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--faint);
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color .2s;
        }

        .link-list a:hover { color: var(--accent); }

        /* ── API Warning ────────────────────────────────────── */
        #apiWarning {
            display: none;
            background: rgba(193,95,60,.06);
            border: 1px solid rgba(193,95,60,.15);
            border-radius: 12px;
            padding: 14px 18px;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 24px;
        }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 600px) {
            main { padding: 0 16px 60px; }
            .hero { padding: 72px 0 40px; }
            .page-title { font-size: 1.65rem; }
            .search-wrap { flex-direction: column; padding: 6px; }
            #urlInput { padding: 14px 12px; }
            #searchBtn { width: 100%; padding: 14px; }
            .card-header { padding: 22px 20px; }
            .stats-row { grid-template-columns: 1fr 1fr; }
            .stat-item { border-bottom: 1px solid var(--border); }
            .stat-item:nth-child(2) { border-right: none; }
            .meta-section, .about-section, .social-grid, .all-links-section { padding-left: 20px; padding-right: 20px; }
            .info-grid { grid-template-columns: 1fr; padding: 20px; }
}
    </style>
</head>
<body>
    <main>
        <div class="hero">
            <h1 class="page-title">Find creator's contact</h1>
            <p class="page-sub">Paste any YouTube URL. We'll find the email and details.</p>
            <div style="margin-top:12px;display:inline-block;background:rgba(193,95,60,.12);border:1px solid rgba(193,95,60,.25);border-radius:6px;padding:4px 12px;font-size:.72rem;color:var(--accent);font-weight:600;letter-spacing:.5px">TEST BUILD</div>
        </div>

        <div id="apiWarning">
            API not connected. Update the Railway URL after deploying.
        </div>

        <div class="search-wrap">
            <input
                id="urlInput"
                type="text"
                placeholder="Video URL..."
                autocomplete="off"
                spellcheck="false"
            />
            <button id="searchBtn" onclick="doSearch()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
            <div id="suggestDropdown" class="suggest-dropdown"></div>
        </div>

        <div id="statusMsg"></div>

        <div id="loader">
            <div class="spinner"></div>
            <div id="loaderText">Fetching channel info...</div>
        </div>

        <div id="result"></div>
    </main>

    <script>
        const API_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? 'http://localhost:5000'
            : 'https://duflat-production.up.railway.app';

        let _currentChannelData = null;  // saved for Find Email
        let _currentReportData = null;  // saved for Email Generator

        /* ── Autocomplete ──────────────────────────────────── */
        const urlInput = document.getElementById('urlInput');
        const suggestBox = document.getElementById('suggestDropdown');
        let _suggestTimer = null;
        let _suggestIdx = -1;

        function looksLikeUrl(v) {
            return /^(https?:\/\/|www\.|youtu|m\.you)/.test(v) || v.includes('.com') || v.includes('.be/');
        }

        async function fetchSuggestions(query) {
            try {
                const resp = await fetch(`${API_URL}/suggest?q=${encodeURIComponent(query)}`);
                if (!resp.ok) return [];
                return await resp.json();
            } catch { return []; }
        }

        function formatSubs(n) {
            if (n >= 1000000) return (n / 1000000).toFixed(1).replace('.0','') + 'M';
            if (n >= 1000) return (n / 1000).toFixed(1).replace('.0','') + 'K';
            return n.toString();
        }

        function showSuggestions(items) {
            if (!items.length) { hideSuggestions(); return; }
            _suggestIdx = -1;
            suggestBox.innerHTML = items.map((ch, i) =>
                `<div class="suggest-item" data-idx="${i}" data-cid="${escapeHTML(ch.channel_id)}">` +
                `<img src="${escapeHTML(ch.thumbnail)}" alt="" onerror="this.style.display='none'">` +
                `<span class="suggest-name">${escapeHTML(ch.name)}</span>` +
                `<span class="suggest-subs">${ch.subscribers ? formatSubs(ch.subscribers) + ' subs' : ''}</span>` +
                `</div>`
            ).join('');
            suggestBox.classList.add('open');

            suggestBox.querySelectorAll('.suggest-item').forEach(el => {
                el.addEventListener('mousedown', e => {
                    e.preventDefault();
                    pickSuggestion(el.dataset.cid);
                });
            });
        }

        function hideSuggestions() {
            suggestBox.classList.remove('open');
            suggestBox.innerHTML = '';
            _suggestIdx = -1;
        }

        function pickSuggestion(channelId) {
            urlInput.value = `https://www.youtube.com/channel/${channelId}`;
            hideSuggestions();
            doSearch();
        }

        function escapeHTML(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        urlInput.addEventListener('input', () => {
            const v = urlInput.value.trim();
            clearTimeout(_suggestTimer);
            if (v.length < 2 || looksLikeUrl(v)) { hideSuggestions(); return; }
            _suggestTimer = setTimeout(async () => {
                const items = await fetchSuggestions(v);
                showSuggestions(items);
            }, 300);
        });

        urlInput.addEventListener('keydown', e => {
            const items = suggestBox.querySelectorAll('.suggest-item');
            if (suggestBox.classList.contains('open') && items.length) {
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    _suggestIdx = Math.min(_suggestIdx + 1, items.length - 1);
                    items.forEach((el, i) => el.classList.toggle('active', i === _suggestIdx));
                    return;
                }
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    _suggestIdx = Math.max(_suggestIdx - 1, 0);
                    items.forEach((el, i) => el.classList.toggle('active', i === _suggestIdx));
                    return;
                }
                if (e.key === 'Enter' && _suggestIdx >= 0) {
                    e.preventDefault();
                    pickSuggestion(items[_suggestIdx].dataset.cid);
                    return;
                }
                if (e.key === 'Escape') { hideSuggestions(); return; }
            }
            if (e.key === 'Enter') doSearch();
        });

        urlInput.addEventListener('blur', () => {
            setTimeout(hideSuggestions, 150);
        });

        if (API_URL.includes('RAILWAY_URL_BURAYA')) {
            document.getElementById('apiWarning').style.display = 'block';
        }

        async function doSearch() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;

            setStatus('');
            showLoader(true);
            showResult(false);
            _currentChannelData = null;
            _currentReportData = null;
            document.getElementById('searchBtn').disabled = true;

            let channelData = null;

            try {
                const res = await fetch(`${API_URL}/scrape`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await res.json();
                if (!res.ok || data.error) {
                    setStatus(data.error || 'An error occurred.');
                } else {
                    channelData = data;
                    _currentChannelData = data;
                    renderResult(data);
                    const resultEl = document.getElementById('result');
                    resultEl.classList.remove('reveal');
                    void resultEl.offsetWidth;
                    resultEl.classList.add('reveal');
                    setTimeout(() => { smoothScrollTo(resultEl.querySelector('.card'), 1200); }, 300);
                }
            } catch (err) {
                setStatus('Could not reach the API - <a href="#" onclick="doSearch();return false" style="color:var(--accent)">retry</a>', true);
            } finally {
                showLoader(false);
                document.getElementById('searchBtn').disabled = false;
            }

        }

        async function summarizeChannel() {
            const channelData = _currentChannelData;
            if (!channelData) return;
            const btn = document.getElementById('summarizeBtn');
            const box = document.getElementById('summaryBox');
            if (!box) return;

            if (btn) { btn.disabled = true; btn.textContent = '⏳ Analyzing...'; }

            const steps = [
                'Fetching video list...',
                'Downloading transcripts (last 5 videos)...',
                'Downloading transcripts (top 5 popular)...',
                'Analyzing spoken content with AI...',
                'Building intelligence report...',
            ];
            let stepIdx = 0;
            box.innerHTML = `<div class="description-loading" style="margin-top:4px">
                <span class="spinner" style="width:13px;height:13px;border-width:2px;margin:0;display:inline-block;flex-shrink:0"></span>
                <span id="reportStep">${steps[0]}</span>
            </div>`;
            const stepTimer = setInterval(() => {
                stepIdx++;
                const el = document.getElementById('reportStep');
                if (el && stepIdx < steps.length) el.textContent = steps[stepIdx];
            }, 4000);

            try {
                const res = await fetch(`${API_URL}/summarize-v2`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel_data: channelData })
                });
                clearInterval(stepTimer);
                const data = await res.json();

                if (data.report) {
                    const LABELS = {
                        content_language:  'Content Language',
                        niche:             'Niche',
                        content_themes:    'Content Themes',
                        audience:          'Audience',
                        content_style:     'Content Style',
                        brand_fit:         'Brand Fit',
                        key_insight:       'Key Insight',
                    };
                    let delay = 0;
                    const rows = Object.entries(LABELS)
                        .filter(([k]) => data.report[k])
                        .map(([k, label]) => {
                            delay += 80;
                            return `<tr class="report-row" style="animation-delay:${delay}ms">
                                <td style="color:var(--muted);white-space:nowrap;padding:5px 12px 5px 0;font-size:.8rem;vertical-align:top">${label}</td>
                                <td style="padding:5px 0;font-size:.85rem;line-height:1.5">${k === 'key_insight' ? esc(data.report[k]).split(/\n+/).filter(Boolean).map(l => l.replace(/^[•]\s*/, '').trim()).filter(Boolean).map(l => '<div style="padding:2px 0 2px 12px;border-left:2px solid var(--accent);margin-bottom:5px">' + l + '</div>').join('') : esc(data.report[k])}</td>
                            </tr>`;
                        }).join('');
                    delay += 80;
                    const tags = Array.isArray(data.tags) && data.tags.length
                        ? `<div class="topic-tags report-tags" style="margin-top:10px;animation-delay:${delay}ms">${data.tags.map(t => `<span class="topic-tag">${esc(t)}</span>`).join('')}</div>`
                        : '';
                    delay += 80;
                    const meta = data.videos_analyzed
                        ? `<div class="report-meta" style="color:var(--faint);font-size:.75rem;margin-top:8px;animation-delay:${delay}ms">Analyzed ${data.videos_analyzed.total} videos (${data.videos_analyzed.transcripts_found} transcripts found)</div>`
                        : '';
                    box.innerHTML = `<div style="margin-bottom:10px"><table style="width:100%;border-collapse:collapse">${rows}</table>${tags}${meta}</div>`;
                    _currentReportData = data;
                    if (btn) { btn.disabled = true; btn.textContent = '✅ Report Ready'; }
                    const arrow = document.getElementById('emailArrow');
                    const emailBtn = document.getElementById('emailGenBtn');
                    if (arrow) arrow.style.display = '';
                    if (emailBtn) emailBtn.style.display = '';
                    setTimeout(() => { smoothScrollTo(btn, 900); }, 300);
                } else {
                    const errMsg = data.error || 'Could not generate report.';
                    box.innerHTML = `<span style="color:var(--faint);font-size:.83rem">${esc(errMsg)} - <a href="#" onclick="summarizeChannel();return false" style="color:var(--accent)">retry</a></span>`;
                    if (btn) { btn.disabled = false; btn.textContent = '✨ Generate AI Report'; }
                }
            } catch (_) {
                clearInterval(stepTimer);
                box.innerHTML = `<span style="color:var(--faint);font-size:.83rem">Could not reach the API - <a href="#" onclick="summarizeChannel();return false" style="color:var(--accent)">retry</a></span>`;
                if (btn) { btn.disabled = false; btn.textContent = '✨ Generate AI Report'; }
            }
        }

        async function generateEmail() {

            if (!box) return;

            }
            box.innerHTML = `<div id="emailLoading" style="margin-top:20px;padding:32px 20px;display:flex;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:.85rem;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)">
                <span style="display:inline-block;width:16px;height:16px;border:2px solid rgba(177,173,161,.12);border-top-color:#C15F3C;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0"></span>
                <span>Writing personalized email<span class="dots-anim"></span></span>
            </div>`;

            try {
                const res = await fetch(`${API_URL}/generate-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        channel_data: _currentChannelData,
                        report_data: _currentReportData,
                    })
                });
                const data = await res.json();

                if (data.subject && data.body) {
                    box.innerHTML = `
                        <div class="email-preview">
                            <div class="email-preview-header">
                                <span style="color:var(--faint);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px">Email Preview</span>
                            </div>
                            <div class="email-subject">
                                <div style="display:flex;justify-content:space-between;align-items:center">
                                    <div><strong>Subject:</strong> ${esc(data.subject)}</div>
                                    <button class="email-copy-btn" onclick="copySubject()">Copy</button>
                                </div>
                            </div>
                            <div class="email-body-wrap">
                                <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px 0">
                                    <span style="color:var(--faint);font-size:.72rem;text-transform:uppercase;letter-spacing:.5px">Body</span>

                    if (btn) { btn.disabled = false; btn.textContent = '✨ Personalized Email'; }

            } catch (_) {
                box.innerHTML = `<span style="color:var(--faint);font-size:.83rem">Could not reach the API - <a href="#" onclick="generateEmail();return false" style="color:var(--accent)">retry</a></span>`;
                if (btn) { btn.disabled = false; btn.textContent = '✨ Personalized Email'; }
            }
        }

        function typewriterEffect(element, text, speed = 12) {
            return new Promise(resolve => {
                element.innerHTML = '';
                let i = 0;
                const len = text.length;
                // Build HTML progressively, respecting <br> tags
                const htmlText = text.replace(/\n/g, '<br>');
                const chunks = htmlText.split(/(<br>)/);
                let fullOutput = '';
                let charIndex = 0;
                let chunkIndex = 0;
                let posInChunk = 0;

                function tick() {
                    if (chunkIndex >= chunks.length) { resolve(); return; }
                    const chunk = chunks[chunkIndex];
                    if (chunk === '<br>') {
                        fullOutput += '<br>';
                        element.innerHTML = fullOutput + '<span class="tw-cursor">|</span>';
                        chunkIndex++;
                        posInChunk = 0;
                        setTimeout(tick, speed);
                        return;
                    }
                    if (posInChunk < chunk.length) {
                        // Add chars in small bursts (2-4) for natural feel
                        const burst = Math.min(2 + Math.floor(Math.random() * 3), chunk.length - posInChunk);
                        fullOutput += chunk.substring(posInChunk, posInChunk + burst);
                        posInChunk += burst;
                        element.innerHTML = fullOutput + '<span class="tw-cursor">|</span>';
                        // Vary speed slightly for realism
                        const jitter = speed + Math.floor(Math.random() * 10) - 4;
                        setTimeout(tick, Math.max(4, jitter));
                    } else {
                        chunkIndex++;
                        posInChunk = 0;
                        tick();
                    }
                }
                tick();
            });
        }

        function copySubject() {
            if (!window._generatedEmail) return;
            navigator.clipboard.writeText(window._generatedEmail.subject).then(() => {
                const btns = document.querySelectorAll('.email-copy-btn');
                if (btns[0]) { btns[0].textContent = 'Copied!'; setTimeout(() => { btns[0].textContent = 'Copy'; }, 2000); }
            });
        }

        function copyBody() {
            if (!window._generatedEmail) return;
            navigator.clipboard.writeText(window._generatedEmail.body).then(() => {
                const btns = document.querySelectorAll('.email-copy-btn');
                if (btns[1]) { btns[1].textContent = 'Copied!'; setTimeout(() => { btns[1].textContent = 'Copy'; }, 2000); }
            });
        }

            }
            emailItem.querySelector('.meta-value').innerHTML =
                `<span style="display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:.85rem">
                    <span style="display:inline-block;width:14px;height:14px;border:2px solid rgba(177,173,161,.12);border-top-color:#C15F3C;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0"></span>
                    Investigating email sources<span class="dots-anim"></span>
                </span>`;

            try {
                const res = await fetch(`${API_URL}/find-email-v2`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ channel_data: _currentChannelData })
                });
                const data = await res.json();

                if (data.found && data.email) {
                    emailItem.querySelector('.meta-value').innerHTML =
                        `<span class="report-row" style="animation-delay:0ms"><a href="mailto:${esc(data.email)}">${esc(data.email)}</a></span>`;
                    _currentChannelData = { ..._currentChannelData, email: data.email };
                    if (btn) { btn.disabled = true; btn.textContent = '\u2713 Email Found'; }
                } else {
                    const hiddenMsg = _currentChannelData?.has_hidden_email
                        ? `<span style="color:var(--accent);font-size:.85rem" title="This channel has a business email but YouTube requires login to reveal it">🔒 Email exists but hidden by YouTube</span>`
                        : `<span style="color:var(--faint);font-style:italic;font-size:.85rem">No email found</span>`;
                    emailItem.querySelector('.meta-value').innerHTML = hiddenMsg;
                    if (btn) { btn.disabled = false; btn.innerHTML = '🔍 Find Email'; }

                emailItem.querySelector('.meta-value').innerHTML =
                    `<span style="color:var(--faint);font-size:.83rem">Search failed - <a href="#" onclick="investigateEmail();return false" style="color:var(--accent)">retry</a></span>`;
                if (btn) { btn.disabled = false; btn.innerHTML = '🔍 Find Email'; }
            }
        }

        function renderResult(d) {
            const name    = d.name || 'Unknown Channel';
            const initial = name.charAt(0).toUpperCase();
            const socialKeys  = ['instagram', 'tiktok', 'twitter', 'facebook', 'discord', 'twitch', 'myanimelist'];
            const socialIcons = { instagram:'📷', tiktok:'🎵', twitter:'𝕏', facebook:'👤', discord:'💬', twitch:'🎮', myanimelist:'🎌' };
            const socialNames = { instagram:'Instagram', tiktok:'TikTok', twitter:'X / Twitter', facebook:'Facebook', discord:'Discord', twitch:'Twitch', myanimelist:'MyAnimeList' };

            const socialBadges = socialKeys
                .filter(s => d[s])
                .map(s => `<a class="social-badge" href="${esc(d[s])}" target="_blank" rel="noopener">${socialIcons[s]} ${socialNames[s]}</a>`)
                .join('');

            const allLinks = Array.isArray(d.all_links) ? d.all_links : [];
            const linkItems = allLinks.slice(0, 12)
                .map(l => `<a href="${esc(l)}" target="_blank" rel="noopener">${esc(l)}</a>`)
                .join('');

            document.getElementById('result').innerHTML = `
                <div class="card">
                    <div class="card-header">
                        ${d.thumbnail && d.thumbnail.includes('yt3.')
                            ? `<img class="channel-avatar" src="${esc(d.thumbnail)}" alt="" style="object-fit:cover" onerror="this.outerHTML='<div class=channel-avatar>${initial}</div>'">`
                            : `<div class="channel-avatar">${initial}</div>`
                        }
                        <div>
                            <div class="channel-name">${esc(name)}</div>
                            ${d.handle     ? `<div class="channel-handle">${esc(d.handle)}</div>` : ''}
                            ${d.channel_url? `<a class="channel-url-link" href="${esc(d.channel_url)}" target="_blank" rel="noopener">${esc(d.channel_url)}</a>` : ''}
                        </div>
                    </div>

                    <div class="stats-row">
                        ${statItem(d.subscribers,    'Subscribers')}
                        ${statItem(d.videos,         'Videos')}
                        ${statItem(d.views,          'Total Views')}
                        ${statItem(d.last_video_date,'Last Video')}
                    </div>

                    <div class="meta-section">
                        <div class="meta-row" id="emailInfoItem">
                            <span class="meta-label">Email</span>
                            ${d.email
                                ? `<span class="meta-value"><a href="mailto:${esc(d.email)}">${esc(d.email)}</a></span>`
                                : `<span class="meta-value">
                                       ${d.has_hidden_email
                                           ? `<span style="color:var(--faint);font-size:.78rem" title="YouTube requires login to reveal this email">🔒 Hidden email</span>`
                                           : ''}
                                       <button class="find-email-btn" id="findEmailBtn" onclick="investigateEmail()">
                                           🔍 Find Email
                                       </button>
                                   </span>`
                            }
                        </div>
                        ${d.location ? `
                        <div class="meta-row">
                            <span class="meta-label">Location</span>
                            <span class="meta-value">${esc(d.location)}</span>
                        </div>` : ''}
                        ${d.joined ? `
                        <div class="meta-row">
                            <span class="meta-label">Joined</span>
                            <span class="meta-value">${esc(d.joined)}</span>
                        </div>` : ''}
                    </div>

                    <div class="about-section" id="summaryBlock">
                        <div class="about-section-header">
                            <div class="report-btn-row">
                                <button class="ai-report-btn" id="summarizeBtn" onclick="summarizeChannel()">
                                    ✨ Generate AI Report
                                </button>
                                <span class="btn-arrow" id="emailArrow" style="display:none">›</span>
                                <button class="email-gen-btn" id="emailGenBtn" onclick="generateEmail()" style="display:none">
                                    ✨ Personalized Email
                                </button>
                            </div>
                        </div>
                        <div id="summaryBox"></div>
                        <div style="margin-top:16px">
                            <span class="section-label" style="margin-left:3px">About</span>
                        </div>

                                ? `<div style="font-family:var(--font-sans);white-space:pre-wrap;max-height:110px;overflow-y:auto">${esc(d.description)}</div>`
                                : `<span style="color:var(--faint);font-style:italic">No description available.</span>`
                            }
                        </div>
                    </div>

                    ${socialBadges ? `<div class="social-grid">${socialBadges}</div>` : ''}

                    ${linkItems ? `
                    <div class="all-links-section">
                        <div class="all-links-title">Creator's External Links</div>

        function statItem(val, label) {
            return `<div class="stat-item">
                <div class="stat-value">${val ? esc(val) : `<span style="color:var(--faint)">—</span>`}</div>
                <div class="stat-label">${label}</div>
            </div>`;
        }

        function infoItem(label, val) {
            if (!val) return `<div class="info-item">
                <span class="info-label">${label}</span>
                <span class="info-value empty">—</span>
            </div>`;
            return `<div class="info-item">
                <span class="info-label">${label}</span>
                <span class="info-value">${val}</span>
            </div>`;
        }

        function esc(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function setStatus(msg, html) {
            const el = document.getElementById('statusMsg');
            if (html) el.innerHTML = msg; else el.textContent = msg;
            el.style.display = msg ? 'block' : 'none';
        }

        function smoothScrollTo(el, duration) {
            if (!el) return;
            const target = el.getBoundingClientRect().top + window.pageYOffset - 20;
            const start = window.pageYOffset;
            const diff = target - start;
            let startTime = null;
            function ease(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
            function step(time) {
                if (!startTime) startTime = time;
                const progress = Math.min((time - startTime) / duration, 1);
                window.scrollTo(0, start + diff * ease(progress));
                if (progress < 1) requestAnimationFrame(step);
            }
            requestAnimationFrame(step);
        }

        function showLoader(show) { document.getElementById('loader').style.display = show ? 'block' : 'none'; }
        function showResult(show) { document.getElementById('result').style.display = show ? 'block' : 'none'; }
    </script>
